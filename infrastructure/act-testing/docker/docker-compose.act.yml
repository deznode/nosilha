# Docker Compose for Act Testing Services
# This provides the same services as the main docker-compose.yml but optimized for testing

networks:
  act-testing:
    external: true
    name: act-testing

services:
  # PostgreSQL Database for Backend Testing
  postgres:
    image: postgres:16-alpine
    container_name: act-postgres
    environment:
      POSTGRES_DB: nosilha_test
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    tmpfs:
      - /tmp
      - /var/run/postgresql
    networks:
      - act-testing
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d nosilha_test"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    labels:
      - "project=act-testing"

  # Firestore Emulator for Metadata Storage
  firestore:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:latest
    container_name: act-firestore
    command: >
      bash -c "
        gcloud components install cloud-firestore-emulator --quiet &&
        gcloud beta emulators firestore start --host-port=0.0.0.0:8081 --project=nosilha-test
      "
    ports:
      - "8081:8081"
    networks:
      - act-testing
    environment:
      - FIRESTORE_EMULATOR_HOST=0.0.0.0:8081
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  # Google Cloud Storage Emulator
  gcs:
    image: fsouza/fake-gcs-server:1.44.0
    container_name: act-gcs
    command: -scheme http -host 0.0.0.0 -port 8082
    ports:
      - "8082:8082"
    networks:
      - act-testing
    volumes:
      - gcs_test_data:/data
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8082 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'

  # Redis (if needed for caching tests)
  redis:
    image: redis:7-alpine
    container_name: act-redis
    ports:
      - "6379:6379"
    tmpfs:
      - /tmp
    networks:
      - act-testing
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 2s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    labels:
      - "project=act-testing"

  # Test Runner Service (for complex scenarios)
  test-runner:
    image: catthehacker/ubuntu:act-22.04
    container_name: act-test-runner
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../../../:/workspace
    working_dir: /workspace
    networks:
      - act-testing
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - FIRESTORE_EMULATOR_HOST=firestore:8080
      - STORAGE_EMULATOR_HOST=gcs:4443
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - testing

volumes:
  postgres_test_data:
    name: act_postgres_test_data
  gcs_test_data:
    name: act_gcs_test_data