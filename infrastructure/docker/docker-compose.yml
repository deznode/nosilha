name: nosilha

services:
  db:
    image: postgres:16-alpine
    container_name: nosilha-postgres-local
    environment:
      - POSTGRES_USER=nosilha
      - POSTGRES_PASSWORD=nosilha
      - POSTGRES_DB=nosilha_db
    ports:
      - "5432:5432"
    volumes:
      - ./data:/var/lib/postgresql/data
    restart: unless-stopped

  # --- Backend Service (Spring Boot + Kotlin) ---
  # Profile-based service - only starts when explicitly requested
  # Usage: docker-compose --profile backend up
  # Pre-build required: cd apps/api && ./gradlew bootBuildImage --imageName=nosilha-backend:local
  backend:
    image: nosilha-backend:local
    container_name: nosilha-backend-local
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/nosilha_db
      - SPRING_DATASOURCE_USERNAME=nosilha
      - SPRING_DATASOURCE_PASSWORD=nosilha
      - SUPABASE_PROJECT_URL=${SUPABASE_PROJECT_URL:-https://wqpgbmrgwbexxldeokiu.supabase.co}
      - APP_CORS_ALLOWED_ORIGINS=http://localhost:3000,http://frontend:3000
      - R2_ENABLED=${R2_ENABLED:-false}
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID:-}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID:-}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY:-}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME:-nosilha-media}
      - R2_PUBLIC_URL=${R2_PUBLIC_URL:-https://media.nosilha.com}
      - AI_ENABLED=${AI_ENABLED:-true}
      - AI_GEMINI_ENABLED=${AI_GEMINI_ENABLED:-true}
      - AI_GEMINI_API_KEY=${AI_GEMINI_API_KEY:-}
      - SPRING_AI_MODEL_CHAT=${SPRING_AI_MODEL_CHAT:-google-genai}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - REVALIDATE_SECRET=${REVALIDATE_SECRET:-}
    profiles:
      - backend
    depends_on:
      - db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # --- Frontend Service (Next.js 16 + React 19 + pnpm) ---
  # Profile-based service - only starts when explicitly requested
  # Usage: docker-compose --profile frontend up
  frontend:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://host.docker.internal:8080}
        - NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN=${NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN}
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        - NEXT_PUBLIC_GA_ID=${NEXT_PUBLIC_GA_ID:-}
        - NEXT_PUBLIC_CLARITY_PROJECT_ID=${NEXT_PUBLIC_CLARITY_PROJECT_ID:-}
    container_name: nosilha-frontend-local
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://backend:8080}
    profiles:
      - frontend
    restart: unless-stopped
    depends_on:
      - db
      - backend
