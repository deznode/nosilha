services:
  db:
    image: postgres:16-alpine
    container_name: nosilha-postgres-local
    environment:
      - POSTGRES_USER=nosilha
      - POSTGRES_PASSWORD=nosilha
      - POSTGRES_DB=nosilha_db
    ports:
      - "5432:5432"
    volumes:
      - ./data:/var/lib/postgresql/data
    restart: unless-stopped

  # --- Firestore Emulator Service ---
  # Uses the official Google Cloud SDK image and a simple, reliable command.
  firestore-emulator:
    image: google/cloud-sdk:emulators
    platform: linux/amd64
    command: gcloud beta emulators firestore start --host-port=0.0.0.0:8081
    ports:
      - "8081:8081"

  # --- Google Cloud Storage (GCS) Emulator Service ---
  # Uses a dedicated, stable third-party image specifically for GCS emulation.
  gcs-emulator:
    image: fsouza/fake-gcs-server:latest
    command: -scheme http -host 0.0.0.0 -port 8082 -public-host localhost
    volumes:
      - ./gcs-storage/data:/storage
    ports:
      - "8082:8082"

  # --- Backend Service (Spring Boot + Kotlin) ---
  # Profile-based service - only starts when explicitly requested
  # Usage: docker-compose --profile backend up
  # Pre-build required: cd backend && ./gradlew bootBuildImage --imageName=nosilha-backend:local
  backend:
    image: nosilha-backend:local
    container_name: nosilha-backend-local
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/nosilha_db
      - SPRING_DATASOURCE_USERNAME=nosilha
      - SPRING_DATASOURCE_PASSWORD=nosilha
      - GCP_SERVERURL=http://gcs-emulator:8082
      - GCS_BUCKET_NAME=nosilha-media
      - FIRESTORE_EMULATOR_HOST=firestore-emulator:8081
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - APP_CORS_ALLOWED_ORIGINS=http://localhost:3000,http://frontend:3000
    profiles:
      - backend
    depends_on:
      - db
      - firestore-emulator
      - gcs-emulator
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # --- Frontend Service (Next.js 15 + React 19 + pnpm) ---
  # Profile-based service - only starts when explicitly requested
  # Usage: docker-compose --profile frontend up
  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://host.docker.internal:8080}
        - NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN=${NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN}
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        - NEXT_PUBLIC_GA_ID=${NEXT_PUBLIC_GA_ID:-}
        - NEXT_PUBLIC_CLARITY_PROJECT_ID=${NEXT_PUBLIC_CLARITY_PROJECT_ID:-}
    container_name: nosilha-frontend-local
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://backend:8080}
    profiles:
      - frontend
    restart: unless-stopped
    depends_on:
      - db
      - backend
