name: nosilha
services:
  db:
    image: postgres:16-alpine
    container_name: nosilha-postgres-local
    environment:
      - POSTGRES_USER=nosilha
      - POSTGRES_PASSWORD=nosilha
      - POSTGRES_DB=nosilha_db
    ports:
      - "5432:5432"
    volumes:
      - ./data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nosilha"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
