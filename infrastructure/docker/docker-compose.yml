services:
  db:
    image: postgres:16-alpine
    container_name: nosilha-postgres-local
    environment:
      - POSTGRES_USER=nosilha
      - POSTGRES_PASSWORD=nosilha
      - POSTGRES_DB=nosilha_db
    ports:
      - "5432:5432"
    volumes:
      - ./data:/var/lib/postgresql/data
    restart: unless-stopped

  # --- Backend Service (Spring Boot + Kotlin) ---
  # Profile-based service - only starts when explicitly requested
  # Usage: docker-compose --profile backend up
  # Pre-build required: cd backend && ./gradlew bootBuildImage --imageName=nosilha-backend:local
  backend:
    image: nosilha-backend:local
    container_name: nosilha-backend-local
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/nosilha_db
      - SPRING_DATASOURCE_USERNAME=nosilha
      - SPRING_DATASOURCE_PASSWORD=nosilha
      - MEDIA_STORAGE_PATH=/app/uploads
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - APP_CORS_ALLOWED_ORIGINS=http://localhost:3000,http://frontend:3000
    volumes:
      - ./uploads:/app/uploads
    profiles:
      - backend
    depends_on:
      - db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # --- Frontend Service (Next.js 15 + React 19 + pnpm) ---
  # Profile-based service - only starts when explicitly requested
  # Usage: docker-compose --profile frontend up
  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://host.docker.internal:8080}
        - NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN=${NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN}
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        - NEXT_PUBLIC_GA_ID=${NEXT_PUBLIC_GA_ID:-}
        - NEXT_PUBLIC_CLARITY_PROJECT_ID=${NEXT_PUBLIC_CLARITY_PROJECT_ID:-}
    container_name: nosilha-frontend-local
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://backend:8080}
    profiles:
      - frontend
    restart: unless-stopped
    depends_on:
      - db
      - backend
