# Lefthook — Git hooks for the Nos Ilha monorepo
# Install: brew install lefthook && lefthook install

pre-commit:
  parallel: true
  commands:
    gitleaks:
      run: gitleaks protect --staged --verbose
      skip:
        - merge
        - rebase

    eslint:
      glob: "apps/web/**/*.{ts,tsx,js,jsx}"
      root: "apps/web/"
      run: npx eslint --max-warnings=0 --fix {staged_files} && git add {staged_files}

    prettier-code:
      glob: "apps/web/**/*.{ts,tsx,js,jsx}"
      root: "apps/web/"
      run: npx prettier --write {staged_files} && git add {staged_files}

    prettier-assets:
      glob: "apps/web/**/*.{json,css,yml,yaml}"
      root: "apps/web/"
      run: npx prettier --write {staged_files} && git add {staged_files}

    content-validation:
      glob: "apps/web/content/**/*.mdx"
      root: "apps/web/"
      run: npx tsx scripts/validate-content.ts

    ktlint:
      glob: "apps/api/**/*.kt"
      root: "apps/api/"
      run: ./gradlew ktlintCheck
