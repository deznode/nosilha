version: 2
updates:
  # Backend dependencies (Gradle/Kotlin)
  - package-ecosystem: "gradle"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    reviewers:
      - "bravdigital/core-team"
    assignees:
      - "bravdigital/security-team"
    commit-message:
      prefix: "deps(backend)"
      include: "scope"
    labels:
      - "dependencies"
      - "backend"
      - "security"
    allow:
      - dependency-type: "direct"
      - dependency-type: "indirect"
    # Group updates for better management
    groups:
      spring-boot:
        patterns:
          - "org.springframework.boot*"
          - "org.springframework*"
        update-types:
          - "minor"
          - "patch"
      kotlin:
        patterns:
          - "org.jetbrains.kotlin*"
          - "kotlin*"
        update-types:
          - "minor"
          - "patch"
      security:
        patterns:
          - "*"
        dependency-type: "direct"
        update-types:
          - "patch"
        # Security updates are prioritized
        priority: 1

  # Frontend dependencies (npm/Node.js)
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    reviewers:
      - "bravdigital/core-team"
    assignees:
      - "bravdigital/security-team"
    commit-message:
      prefix: "deps(frontend)"
      include: "scope"
    labels:
      - "dependencies"
      - "frontend"
      - "security"
    allow:
      - dependency-type: "direct"
      - dependency-type: "indirect"
    # Ignore specific packages that cause issues
    ignore:
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
    # Group related updates
    groups:
      react-ecosystem:
        patterns:
          - "react*"
          - "@types/react*"
        update-types:
          - "minor"
          - "patch"
      next-ecosystem:
        patterns:
          - "next*"
          - "@next/*"
        update-types:
          - "minor"
          - "patch"
      testing:
        patterns:
          - "*jest*"
          - "*testing*"
          - "@testing-library/*"
        update-types:
          - "minor"
          - "patch"
      security:
        patterns:
          - "*"
        dependency-type: "direct"
        update-types:
          - "patch"
        priority: 1

  # Infrastructure dependencies (Terraform)
  - package-ecosystem: "terraform"
    directory: "/infrastructure/terraform"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "10:00"
    open-pull-requests-limit: 5
    reviewers:
      - "bravdigital/core-team"
    assignees:
      - "bravdigital/infrastructure-team"
    commit-message:
      prefix: "deps(infrastructure)"
      include: "scope"
    labels:
      - "dependencies"
      - "infrastructure"
      - "terraform"

  # Docker dependencies
  - package-ecosystem: "docker"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "10:00"
    open-pull-requests-limit: 5
    reviewers:
      - "bravdigital/core-team"
    commit-message:
      prefix: "deps(docker)"
      include: "scope"
    labels:
      - "dependencies"
      - "docker"
      - "security"

  - package-ecosystem: "docker"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "10:00"
    open-pull-requests-limit: 5
    reviewers:
      - "bravdigital/core-team"
    commit-message:
      prefix: "deps(docker)"
      include: "scope"
    labels:
      - "dependencies"
      - "docker"
      - "security"

  - package-ecosystem: "docker"
    directory: "/infrastructure/docker"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "10:00"
    open-pull-requests-limit: 5
    reviewers:
      - "bravdigital/core-team"
    commit-message:
      prefix: "deps(docker)"
      include: "scope"
    labels:
      - "dependencies"
      - "docker"
      - "infrastructure"

  # GitHub Actions dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "thursday"
      time: "10:00"
    open-pull-requests-limit: 5
    reviewers:
      - "bravdigital/core-team"
    commit-message:
      prefix: "deps(ci)"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
      - "ci/cd"
    groups:
      actions:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"