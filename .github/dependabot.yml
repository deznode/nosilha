version: 2

# Do not set `target-branch` here. These entries previously targeted `develop`,
# but every gating workflow filters on `branches: [main]`, so Dependabot PRs
# received no CI at all and had to be retargeted to main by hand before merging.
# With no `target-branch`, Dependabot targets the default branch (main) and the
# PRs are gated automatically.

updates:
  # `directory: /`, not `/apps/web`. This is a pnpm workspace (see
  # pnpm-workspace.yaml) and pnpm-lock.yaml lives at the repo root. Scoped to
  # /apps/web, Dependabot bumped apps/web/package.json but could not see — let
  # alone regenerate — the root lockfile, so every npm PR failed CI with
  # ERR_PNPM_OUTDATED_LOCKFILE under `pnpm install --frozen-lockfile`.
  # From the root, Dependabot resolves the workspace and updates both.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      dependencies:
        update-types:
          - major
          - minor
          - patch

  - package-ecosystem: gradle
    directory: /apps/api
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      dependencies:
        update-types:
          - major
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      actions:
        update-types:
          - major
          - minor
          - patch

  - package-ecosystem: terraform
    directory: /infrastructure/terraform
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dependencies:
        update-types:
          - major
          - minor
          - patch

  - package-ecosystem: docker
    directory: /infrastructure/docker
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dependencies:
        update-types:
          - major
          - minor
          - patch
