version: 2

updates:
  - package-ecosystem: npm
    directory: /apps/web
    target-branch: develop
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      dependencies:
        update-types:
          - minor
          - patch

  - package-ecosystem: gradle
    directory: /apps/api
    target-branch: develop
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      dependencies:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    target-branch: develop
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      actions:
        update-types:
          - minor
          - patch

  - package-ecosystem: terraform
    directory: /infrastructure/terraform
    target-branch: develop
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: docker
    directory: /infrastructure/docker
    target-branch: develop
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
