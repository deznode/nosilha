version: 2

# Do not set `target-branch` here. These entries previously targeted `develop`,
# but every gating workflow filters on `branches: [main]`, so Dependabot PRs
# received no CI at all and had to be retargeted to main by hand before merging.
# With no `target-branch`, Dependabot targets the default branch (main) and the
# PRs are gated automatically.

updates:
  - package-ecosystem: npm
    directory: /apps/web
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      dependencies:
        update-types:
          - major
          - minor
          - patch

  - package-ecosystem: gradle
    directory: /apps/api
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      dependencies:
        update-types:
          - major
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      actions:
        update-types:
          - major
          - minor
          - patch

  - package-ecosystem: terraform
    directory: /infrastructure/terraform
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dependencies:
        update-types:
          - major
          - minor
          - patch

  - package-ecosystem: docker
    directory: /infrastructure/docker
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dependencies:
        update-types:
          - major
          - minor
          - patch
