# Nos Ilha CodeQL Configuration
# 
# WARNING: This configuration requires GitHub Advanced Security to be enabled
# - For private repositories: Requires a paid Advanced Security license
# - For public repositories: Advanced Security is available for free
# 
# The CodeQL workflows use continue-on-error to fail gracefully when Advanced Security
# is not available, preventing workflow failures while still attempting security analysis

name: "Nos Ilha CodeQL Config"

disable-default-queries: false

queries:
  - uses: security-and-quality

# Paths to include in the analysis
paths:
  - "backend/src"
  - "frontend/src"

# Paths to ignore during analysis
paths-ignore:
  - "**/node_modules"
  - "**/build"
  - "**/dist"
  - "**/target"
  - "**/*.min.js"
  - "**/*.bundle.js"
  - "**/test/**"
  - "**/tests/**"
  - "**/__tests__/**"
  - "**/spec/**"
  - "**/specs/**"
  - "infrastructure/docker"
  - "infrastructure/terraform"
  - "scripts"
  - "docs"