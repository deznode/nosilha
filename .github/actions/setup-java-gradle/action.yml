name: 'Setup Java & Gradle'
description: 'Configure JDK 25 and Gradle with caching for the Nos Ilha backend'

inputs:
  cache-read-only:
    description: 'Use read-only cache (recommended for PRs)'
    required: false
    default: 'false'
  working-directory:
    description: 'Working directory for Gradle commands'
    required: false
    default: './apps/api'

runs:
  using: 'composite'
  steps:
    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-home-cache-cleanup: true
        cache-read-only: ${{ inputs.cache-read-only }}
        dependency-graph: 'generate-and-submit'
      continue-on-error: true
      id: gradle-setup

    - name: Setup Gradle (fallback without cache)
      if: failure() && steps.gradle-setup.outcome == 'failure'
      uses: gradle/actions/setup-gradle@v4
      with:
        cache-disabled: true
        dependency-graph: 'generate-and-submit'
