name: Frontend CI/CD

# Deployment Strategy: Always deploy from main branch (trunk-based development)
# - Path-based triggering provides cost optimization (workflow only runs when frontend changes)
# - When workflow runs, it always completes the full pipeline for deployment reliability
# - Manual force deployment option available via workflow_dispatch

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
      - '.github/workflows/reusable-security-scan.yml'
      # Exclude documentation and non-functional changes to save costs
      - '!frontend/**/*.md'
      - '!frontend/**/*.txt'
      - '!frontend/**/*.gitignore'
      - '!frontend/**/README*'
      - '!frontend/**/.editorconfig'
      - '!frontend/**/*.stories.*'  # Storybook files
      - '!frontend/**/*.test.*'     # Individual test files (CI runs all tests anyway)
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
      - '.github/workflows/reusable-security-scan.yml'
      # Exclude documentation and non-functional changes to save costs
      - '!frontend/**/*.md'
      - '!frontend/**/*.txt'
      - '!frontend/**/*.gitignore'
      - '!frontend/**/README*'
      - '!frontend/**/.editorconfig'
      - '!frontend/**/*.stories.*'  # Storybook files
      - '!frontend/**/*.test.*'     # Individual test files (CI runs all tests anyway)
  workflow_call:
    inputs:
      skip-deploy:
        description: 'Skip deployment steps'
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy to production'
        required: true
        default: false
        type: boolean
      force_deploy:
        description: 'Force deployment even without code changes'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: us-east1-docker.pkg.dev
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-east1
  SERVICE_NAME: nosilha-frontend
  IMAGE_TAG: ${{ github.sha }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-scan:
    name: Security Scanning
    uses: ./.github/workflows/reusable-security-scan.yml
    with:
      components: 'frontend'
      include-lint-analysis: true

  test-and-lint:
    name: Tests & Quality
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Run comprehensive quality checks with production Node.js version
      - name: Run tests and quality checks
        run: |
          # Run linting, type checking, and build in parallel
          npm run lint -- --format=@microsoft/eslint-formatter-sarif --output-file=eslint-results.sarif &
          npx tsc --noEmit &
          wait
          # Build after checks pass
          npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_API_URL: "http://test-mode-mock-only:8080"
          NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN: ${{ secrets.NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

  bundle-analysis:
    name: Bundle Size Analysis
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && !github.event.pull_request.draft
    defaults:
      run:
        working-directory: ./frontend
        
    steps:
      - uses: actions/checkout@v4
      
      - name: Check for relevant changes
        id: changes
        uses: dorny/paths-filter@v2
        with:
          filters: |
            bundle:
              - 'frontend/package.json'
              - 'frontend/package-lock.json'
              - 'frontend/src/**'
              - 'frontend/next.config.ts'
      
      - name: Setup Node.js
        if: ${{ steps.changes.outputs.bundle == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
          
      - name: Install dependencies
        if: ${{ steps.changes.outputs.bundle == 'true' }}
        run: npm ci
        
      - name: Build and check bundle size
        if: ${{ steps.changes.outputs.bundle == 'true' }}
        run: |
          npm run build
          npx bundlesize
        env:
          NODE_ENV: production
          NEXT_PUBLIC_API_URL: "http://test-mode-mock-only:8080"
          NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN: ${{ secrets.NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

  # Note: Path-based triggering (on.push.paths) provides cost optimization
  # while ensuring reliable deployment when the workflow runs

  build:
    name: Build & Package
    runs-on: ubuntu-latest
    needs: [security-scan, test-and-lint]
    # Always build when workflow runs (reliability over cost optimization)
    if: |
      (github.ref == 'refs/heads/main' && !inputs.skip-deploy) ||
      (github.event_name == 'workflow_dispatch' && (inputs.deploy == true || inputs.force_deploy == true))
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    defaults:
      run:
        working-directory: ./frontend

    # Add OIDC permissions
    permissions:
      contents: read
      id-token: write  # Required for OIDC token requests

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/936816281178/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider'
          service_account: 'nosilha-cicd-deployer@nosilha.iam.gserviceaccount.com'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }}
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/nosilha-frontend/nosilha-web-ui
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
            
      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/nosilha-frontend/nosilha-web-ui:${{ github.sha }}
            ${{ github.ref == 'refs/heads/main' && format('{0}/{1}/nosilha-frontend/nosilha-web-ui:latest', env.REGISTRY, env.PROJECT_ID) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN=${{ secrets.NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN }}
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build]
    if: |
      (github.ref == 'refs/heads/main' && needs.build.result == 'success' && !inputs.skip-deploy) ||
      (github.event_name == 'workflow_dispatch' && needs.build.result == 'success' && (inputs.deploy == true || inputs.force_deploy == true))
    environment: production

    # Add OIDC permissions
    permissions:
      contents: read
      id-token: write  # Required for OIDC token requests

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/936816281178/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider'
          service_account: 'nosilha-cicd-deployer@nosilha.iam.gserviceaccount.com'
          
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        
      - name: Deploy to Cloud Run (Production)
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/nosilha-frontend/nosilha-web-ui:${{ github.sha }} \
            --platform=managed \
            --region=${{ env.REGION }} \
            --service-account=nosilha-frontend-runner@${{ env.PROJECT_ID }}.iam.gserviceaccount.com \
            --set-env-vars="NODE_ENV=production,NEXT_TELEMETRY_DISABLED=1" \
            --memory=256Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=2 \
            --timeout=300
            
      - name: Health Check
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} --region=${{ env.REGION }} --format='value(status.url)')
          echo "Service URL: $SERVICE_URL"
          
          # Wait for service to be ready
          sleep 30
          
          # Basic health check
          curl -f "$SERVICE_URL" || (echo "Health check failed" && exit 1)