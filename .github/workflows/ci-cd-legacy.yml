name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
        - staging
        - production

env:
  REGISTRY: gcr.io
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: europe-west1

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      frontend: ${{ steps.changes.outputs.frontend }}
      infrastructure: ${{ steps.changes.outputs.infrastructure }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/**'
            frontend:
              - 'frontend/**'
              - '.github/workflows/**'
            infrastructure:
              - 'infrastructure/**'
              - '.github/workflows/**'

  test-backend:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    defaults:
      run:
        working-directory: ./backend
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_USER: test
          POSTGRES_DB: nosilha_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          
      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        
      - name: Run tests
        run: ./gradlew test
        env:
          SPRING_PROFILES_ACTIVE: test
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/nosilha_test
          SPRING_DATASOURCE_USERNAME: test
          SPRING_DATASOURCE_PASSWORD: test
          
      - name: Generate test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Backend Tests
          path: backend/build/test-results/test/*.xml
          reporter: java-junit

  test-frontend:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    defaults:
      run:
        working-directory: ./frontend
        
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run linting
        run: npm run lint
        
      - name: Run type checking
        run: npm run build

  build-backend:
    runs-on: ubuntu-latest
    needs: [changes, test-backend]
    if: needs.changes.outputs.backend == 'true'
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    defaults:
      run:
        working-directory: ./backend
        
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          
      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          
      - name: Configure Docker for GCR
        run: gcloud auth configure-docker gcr.io
        
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/nosilha-backend
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
            
      - name: Build and push Docker image
        id: build
        run: |
          ./gradlew bootBuildImage \
            --imageName=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/nosilha-backend:${{ github.sha }} \
            --publishImage
          
          # Also tag with branch name and latest
          docker tag ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/nosilha-backend:${{ github.sha }} \
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/nosilha-backend:${{ github.ref_name }}
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/nosilha-backend:${{ github.ref_name }}
          
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            docker tag ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/nosilha-backend:${{ github.sha }} \
              ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/nosilha-backend:latest
            docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/nosilha-backend:latest
          fi

  build-frontend:
    runs-on: ubuntu-latest
    needs: [changes, test-frontend]
    if: needs.changes.outputs.frontend == 'true'
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    defaults:
      run:
        working-directory: ./frontend
        
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
          
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          
      - name: Configure Docker for GCR
        run: gcloud auth configure-docker gcr.io
        
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/nosilha-frontend
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
            
      - name: Build and push Docker image
        id: build
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/nosilha-frontend:${{ github.sha }} .
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/nosilha-frontend:${{ github.sha }}
          
          # Also tag with branch name and latest
          docker tag ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/nosilha-frontend:${{ github.sha }} \
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/nosilha-frontend:${{ github.ref_name }}
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/nosilha-frontend:${{ github.ref_name }}
          
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            docker tag ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/nosilha-frontend:${{ github.sha }} \
              ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/nosilha-frontend:latest
            docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/nosilha-frontend:latest
          fi

  deploy-staging:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: github.ref == 'refs/heads/develop' && (needs.build-backend.result == 'success' || needs.build-frontend.result == 'success')
    environment: staging
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        
      - name: Deploy to Cloud Run (Staging)
        run: |
          # Deploy backend if it was built
          if [ "${{ needs.build-backend.result }}" = "success" ]; then
            gcloud run deploy nosilha-backend-staging \
              --image=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/nosilha-backend:${{ github.sha }} \
              --platform=managed \
              --region=${{ env.REGION }} \
              --allow-unauthenticated \
              --set-env-vars="SPRING_PROFILES_ACTIVE=staging" \
              --memory=1Gi \
              --cpu=1 \
              --min-instances=0 \
              --max-instances=10
          fi
          
          # Deploy frontend if it was built
          if [ "${{ needs.build-frontend.result }}" = "success" ]; then
            gcloud run deploy nosilha-frontend-staging \
              --image=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/nosilha-frontend:${{ github.sha }} \
              --platform=managed \
              --region=${{ env.REGION }} \
              --allow-unauthenticated \
              --set-env-vars="NODE_ENV=production,API_URL=${{ secrets.STAGING_API_URL }}" \
              --memory=512Mi \
              --cpu=1 \
              --min-instances=0 \
              --max-instances=5
          fi

  deploy-production:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: github.ref == 'refs/heads/main' && (needs.build-backend.result == 'success' || needs.build-frontend.result == 'success')
    environment: production
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        
      - name: Deploy to Cloud Run (Production)
        run: |
          # Deploy backend if it was built
          if [ "${{ needs.build-backend.result }}" = "success" ]; then
            gcloud run deploy nosilha-backend \
              --image=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/nosilha-backend:${{ github.sha }} \
              --platform=managed \
              --region=${{ env.REGION }} \
              --allow-unauthenticated \
              --set-env-vars="SPRING_PROFILES_ACTIVE=production" \
              --memory=2Gi \
              --cpu=2 \
              --min-instances=1 \
              --max-instances=100
          fi
          
          # Deploy frontend if it was built
          if [ "${{ needs.build-frontend.result }}" = "success" ]; then
            gcloud run deploy nosilha-frontend \
              --image=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/nosilha-frontend:${{ github.sha }} \
              --platform=managed \
              --region=${{ env.REGION }} \
              --allow-unauthenticated \
              --set-env-vars="NODE_ENV=production,API_URL=${{ secrets.PRODUCTION_API_URL }}" \
              --memory=1Gi \
              --cpu=1 \
              --min-instances=1 \
              --max-instances=50
          fi

  deploy-infrastructure:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.infrastructure == 'true' && github.ref == 'refs/heads/main'
    environment: production
    defaults:
      run:
        working-directory: ./infrastructure/terraform
        
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.0"
          
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          
      - name: Terraform Init
        run: terraform init
        
      - name: Terraform Plan
        run: terraform plan -out=tfplan
        
      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan