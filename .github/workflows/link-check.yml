name: External Link Check

on:
  schedule:
    # Run every Sunday at 2am UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:

jobs:
  check-links:
    name: Check External Links
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node & pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Install markdown-link-check
        run: npm install -g markdown-link-check

      # No `|| true` / `continue-on-error` here: they made this step incapable of
      # failing, which left the `if: failure()` issue-reporter below unreachable.
      # This workflow is schedule/dispatch-only and gates no PR, so failing is safe.
      - name: Check external links in MDX files
        working-directory: apps/web
        run: |
          find content -name "*.mdx" -print0 | xargs -0 -n1 markdown-link-check --quiet --config ../../.github/markdown-link-check-config.json

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const title = 'External Link Check Failed';
            const body = `The weekly external link check found broken links in MDX content files.

            Please review the workflow logs and fix any broken external links.

            Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['content', 'broken-links']
            });
