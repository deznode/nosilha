name: GitHub Actions Performance Analytics

# Performance monitoring using GitHub's free Performance Metrics
# Runs weekly to track workflow efficiency and performance trends
on:
  schedule:
    - cron: '0 10 * * 1'  # Weekly on Monday at 10 AM UTC
  workflow_dispatch:
    inputs:
      analysis_days:
        description: 'Number of days to analyze'
        required: false
        default: '7'
        type: string

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  performance-analysis:
    name: Workflow Performance Analysis
    runs-on: ubuntu-latest

    permissions:
      contents: read
      actions: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set analysis period
        id: period
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            DAYS="${{ github.event.inputs.analysis_days }}"
          else
            DAYS="7"
          fi

          END_DATE=$(date -u +"%Y-%m-%d")
          START_DATE=$(date -u -d "${DAYS} days ago" +"%Y-%m-%d")

          echo "start_date=${START_DATE}" >> $GITHUB_OUTPUT
          echo "end_date=${END_DATE}" >> $GITHUB_OUTPUT
          echo "analysis_days=${DAYS}" >> $GITHUB_OUTPUT

          echo "📊 Performance analysis period: ${START_DATE} to ${END_DATE} (${DAYS} days)"

      - name: Fetch performance data
        id: performance
        run: |
          echo "🔍 Fetching workflow performance data..."

          # Get workflow runs from the analysis period
          gh api repos/${{ github.repository }}/actions/runs \
            --paginate \
            --jq '.workflow_runs[] | select(.created_at >= "${{ steps.period.outputs.start_date }}T00:00:00Z") | {
              id: .id,
              name: .name,
              status: .status,
              conclusion: .conclusion,
              created_at: .created_at,
              updated_at: .updated_at,
              run_started_at: .run_started_at,
              html_url: .html_url,
              run_number: .run_number,
              event: .event,
              actor: .actor.login,
              head_branch: .head_branch
            }' > workflow_runs.json

          # Initialize performance report
          echo "# GitHub Actions Performance Analytics" > performance_report.md
          echo "" >> performance_report.md
          echo "**Analysis Period:** ${{ steps.period.outputs.start_date }} to ${{ steps.period.outputs.end_date }} (${{ steps.period.outputs.analysis_days }} days)" >> performance_report.md
          echo "**Generated:** $(date -u)" >> performance_report.md
          echo "" >> performance_report.md

          # Performance tracking variables
          total_runs=0
          total_duration_minutes=0
          total_queue_time_minutes=0
          successful_runs=0
          failed_runs=0
          cancelled_runs=0

          # Workflow-specific metrics
          declare -A workflow_durations
          declare -A workflow_queue_times
          declare -A workflow_runs_count
          declare -A workflow_success_count
          declare -A workflow_failure_count

          # Process each workflow run for performance analysis
          while IFS= read -r run; do
            if [ -z "$run" ]; then continue; fi

            run_id=$(echo "$run" | jq -r '.id')
            workflow_name=$(echo "$run" | jq -r '.name')
            conclusion=$(echo "$run" | jq -r '.conclusion')
            created_at=$(echo "$run" | jq -r '.created_at')
            updated_at=$(echo "$run" | jq -r '.updated_at')
            run_started_at=$(echo "$run" | jq -r '.run_started_at')

            echo "Analyzing performance for run $run_id: $workflow_name"

            # Calculate durations if timestamps are available
            if [ "$created_at" != "null" ] && [ "$updated_at" != "null" ]; then
              created_epoch=$(date -d "$created_at" +%s)
              updated_epoch=$(date -d "$updated_at" +%s)
              total_duration_seconds=$((updated_epoch - created_epoch))
              total_duration_minutes=$((total_duration_seconds / 60))

              # Queue time calculation (created to run_started)
              if [ "$run_started_at" != "null" ]; then
                started_epoch=$(date -d "$run_started_at" +%s)
                queue_time_seconds=$((started_epoch - created_epoch))
                queue_time_minutes=$((queue_time_seconds / 60))
              else
                queue_time_minutes=0
              fi

              # Update totals
              total_runs=$((total_runs + 1))
              total_duration_minutes=$((total_duration_minutes + total_duration_minutes))
              total_queue_time_minutes=$((total_queue_time_minutes + queue_time_minutes))

              # Update workflow-specific metrics
              workflow_durations["$workflow_name"]=$((${workflow_durations["$workflow_name"]:-0} + total_duration_minutes))
              workflow_queue_times["$workflow_name"]=$((${workflow_queue_times["$workflow_name"]:-0} + queue_time_minutes))
              workflow_runs_count["$workflow_name"]=$((${workflow_runs_count["$workflow_name"]:-0} + 1))

              # Track success/failure by workflow
              case "$conclusion" in
                "success")
                  successful_runs=$((successful_runs + 1))
                  workflow_success_count["$workflow_name"]=$((${workflow_success_count["$workflow_name"]:-0} + 1))
                  ;;
                "failure")
                  failed_runs=$((failed_runs + 1))
                  workflow_failure_count["$workflow_name"]=$((${workflow_failure_count["$workflow_name"]:-0} + 1))
                  ;;
                "cancelled")
                  cancelled_runs=$((cancelled_runs + 1))
                  ;;
              esac
            fi

          done < <(jq -c '.[]' workflow_runs.json)

          # Generate performance summary
          echo "## 📊 Performance Summary" >> performance_report.md
          echo "" >> performance_report.md
          echo "| Metric | Value |" >> performance_report.md
          echo "|--------|-------|" >> performance_report.md
          echo "| **Total Workflow Runs** | ${total_runs} |" >> performance_report.md
          echo "| **Successful Runs** | ${successful_runs} |" >> performance_report.md
          echo "| **Failed Runs** | ${failed_runs} |" >> performance_report.md
          echo "| **Cancelled Runs** | ${cancelled_runs} |" >> performance_report.md

          if [ $total_runs -gt 0 ]; then
            success_rate=$(( (successful_runs * 100) / total_runs ))
            failure_rate=$(( (failed_runs * 100) / total_runs ))
            avg_duration=$(( total_duration_minutes / total_runs ))
            avg_queue_time=$(( total_queue_time_minutes / total_runs ))

            echo "| **Success Rate** | ${success_rate}% |" >> performance_report.md
            echo "| **Failure Rate** | ${failure_rate}% |" >> performance_report.md
            echo "| **Average Duration** | ${avg_duration} minutes |" >> performance_report.md
            echo "| **Average Queue Time** | ${avg_queue_time} minutes |" >> performance_report.md
          fi

          echo "" >> performance_report.md

          # Workflow performance breakdown
          echo "## 🔧 Workflow Performance Breakdown" >> performance_report.md
          echo "" >> performance_report.md
          echo "| Workflow | Runs | Avg Duration | Avg Queue Time | Success Rate | Performance |" >> performance_report.md
          echo "|----------|------|--------------|----------------|--------------|-------------|" >> performance_report.md

          performance_issues_detected=false

          for workflow in "${!workflow_runs_count[@]}"; do
            w_runs=${workflow_runs_count[$workflow]}
            w_total_duration=${workflow_durations[$workflow]}
            w_total_queue=${workflow_queue_times[$workflow]}
            w_success=${workflow_success_count[$workflow]:-0}
            w_failures=${workflow_failure_count[$workflow]:-0}

            w_avg_duration=$(( w_total_duration / w_runs ))
            w_avg_queue=$(( w_total_queue / w_runs ))
            w_success_rate=$(( (w_success * 100) / w_runs ))

            # Performance assessment
            performance_status="✅ Good"
            if [ $w_avg_duration -gt 30 ]; then
              performance_status="⚠️ Slow"
              performance_issues_detected=true
            elif [ $w_avg_queue -gt 5 ]; then
              performance_status="⏱️ High Queue"
              performance_issues_detected=true
            elif [ $w_success_rate -lt 95 ]; then
              performance_status="❌ Unreliable"
              performance_issues_detected=true
            fi

            echo "| $workflow | $w_runs | ${w_avg_duration}m | ${w_avg_queue}m | ${w_success_rate}% | $performance_status |" >> performance_report.md
          done

          echo "" >> performance_report.md

          # Performance insights and recommendations
          echo "## 💡 Performance Insights" >> performance_report.md
          echo "" >> performance_report.md

          if [ $performance_issues_detected = true ]; then
            echo "### ⚠️ Performance Issues Detected" >> performance_report.md
            echo "" >> performance_report.md
            echo "**Recommended Actions:**" >> performance_report.md

            for workflow in "${!workflow_runs_count[@]}"; do
              w_runs=${workflow_runs_count[$workflow]}
              w_avg_duration=$(( ${workflow_durations[$workflow]} / w_runs ))
              w_avg_queue=$(( ${workflow_queue_times[$workflow]} / w_runs ))
              w_success_rate=$(( (${workflow_success_count[$workflow]:-0} * 100) / w_runs ))

              if [ $w_avg_duration -gt 30 ]; then
                echo "- **$workflow**: High duration (${w_avg_duration}m) - Consider optimizing build steps, caching, or parallelization" >> performance_report.md
              fi

              if [ $w_avg_queue -gt 5 ]; then
                echo "- **$workflow**: High queue time (${w_avg_queue}m) - Consider workflow concurrency limits or runner availability" >> performance_report.md
              fi

              if [ $w_success_rate -lt 95 ]; then
                echo "- **$workflow**: Low success rate (${w_success_rate}%) - Investigate and fix failing tests or flaky workflows" >> performance_report.md
              fi
            done
          else
            echo "### ✅ Performance Status: Good" >> performance_report.md
            echo "" >> performance_report.md
            echo "All workflows are performing within acceptable parameters:" >> performance_report.md
            echo "- Average durations under 30 minutes" >> performance_report.md
            echo "- Queue times under 5 minutes" >> performance_report.md
            echo "- Success rates above 95%" >> performance_report.md
          fi

          echo "" >> performance_report.md

          # Historical trend analysis (compare with previous periods)
          echo "## 📈 Trend Analysis" >> performance_report.md
          echo "" >> performance_report.md

          # Check if previous performance reports exist
          if [ -f "docs/monitoring/latest-performance-report.md" ]; then
            echo "**Trend Comparison**: Available in future iterations with historical data" >> performance_report.md
          else
            echo "**Trend Comparison**: Baseline established - trends will be available in future reports" >> performance_report.md
          fi

          echo "" >> performance_report.md

          # Quick wins and optimization tips
          echo "## 🚀 Quick Optimization Tips" >> performance_report.md
          echo "" >> performance_report.md
          echo "**General Performance Improvements:**" >> performance_report.md
          echo "- ✅ Use caching for dependencies (npm, Gradle, Docker layers)" >> performance_report.md
          echo "- ✅ Implement smart path filtering to skip unnecessary runs" >> performance_report.md
          echo "- ✅ Optimize Docker builds with multi-stage builds and .dockerignore" >> performance_report.md
          echo "- ✅ Use concurrency controls to cancel outdated runs" >> performance_report.md
          echo "- ✅ Parallelize independent jobs and steps" >> performance_report.md
          echo "" >> performance_report.md

          # Output performance metrics for alerts
          echo "total_runs=${total_runs}" >> $GITHUB_OUTPUT
          echo "success_rate=${success_rate:-0}" >> $GITHUB_OUTPUT
          echo "performance_issues=${performance_issues_detected}" >> $GITHUB_OUTPUT

          if [ $performance_issues_detected = true ]; then
            echo "alert_needed=true" >> $GITHUB_OUTPUT
            echo "alert_message=⚠️ Performance issues detected in workflow analysis" >> $GITHUB_OUTPUT
          else
            echo "alert_needed=false" >> $GITHUB_OUTPUT
            echo "alert_message=✅ All workflows performing within acceptable parameters" >> $GITHUB_OUTPUT
          fi

          echo "" >> performance_report.md
          echo "---" >> performance_report.md
          echo "*Report generated by GitHub Actions Performance Analytics*" >> performance_report.md

        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Save performance report
        run: |
          # Ensure monitoring directory exists
          mkdir -p docs/monitoring

          # Save timestamped report
          report_date=$(date -u +"%Y-%m-%d")
          cp performance_report.md "docs/monitoring/performance-report-${report_date}.md"

          # Update latest report
          cp performance_report.md "docs/monitoring/latest-performance-report.md"

          echo "📁 Saved performance report to docs/monitoring/"

      - name: Create performance issue for problems
        if: steps.performance.outputs.alert_needed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const totalRuns = '${{ steps.performance.outputs.total_runs }}';
            const successRate = '${{ steps.performance.outputs.success_rate }}';

            const title = '⚠️ Workflow Performance Issues Detected';

            const body = `## ${{ steps.performance.outputs.alert_message }}

            **Performance Analysis Summary:**
            - Analysis Period: ${{ steps.period.outputs.start_date }} to ${{ steps.period.outputs.end_date }}
            - Total Runs: ${totalRuns}
            - Success Rate: ${successRate}%

            **Issues Detected:**
            - Workflows with high duration (>30 minutes)
            - High queue times (>5 minutes)
            - Low success rates (<95%)

            **Action Required:**
            1. Review the detailed performance report: docs/monitoring/latest-performance-report.md
            2. Identify workflows with performance issues
            3. Implement optimization strategies:
               - Enhance caching strategies
               - Optimize build processes
               - Fix failing tests
               - Consider workflow parallelization

            **Quick Wins:**
            - Review workflows marked with ⚠️ or ❌ in the performance breakdown
            - Check for flaky tests causing failures
            - Optimize Docker builds and dependency installation
            - Implement better error handling

            ---
            *This issue was automatically created by the Performance Analytics workflow*`;

            // Check for existing performance issues
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'performance,github-actions'
            });

            const existingIssue = issues.find(issue =>
              issue.title.includes('Workflow Performance Issues')
            );

            if (existingIssue) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                title: title,
                body: body
              });
              console.log(`Updated existing performance issue #${existingIssue.number}`);
            } else {
              const { data: newIssue } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['performance', 'github-actions', 'optimization']
              });
              console.log(`Created new performance issue #${newIssue.number}`);
            }

      - name: Performance summary
        run: |
          echo "📈 Performance Analysis Complete for ${{ steps.period.outputs.analysis_days }} days:"
          echo "- Total runs analyzed: ${{ steps.performance.outputs.total_runs }}"
          echo "- Success rate: ${{ steps.performance.outputs.success_rate }}%"
          echo "- ${{ steps.performance.outputs.alert_message }}"
          echo ""
          echo "📄 Detailed report: docs/monitoring/latest-performance-report.md"

      - name: Clean up temporary files
        if: always()
        run: |
          rm -f workflow_runs.json
          rm -f performance_report.md