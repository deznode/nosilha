name: Reusable Security Scanning

on:
  workflow_call:
    inputs:
      components:
        description: 'Components to scan (space-separated: backend frontend infrastructure)'
        required: true
        type: string
      include-lint-analysis:
        description: 'Include code quality analysis (ESLint, detekt)'
        required: false
        type: boolean
        default: true

# Cost optimization: single concurrency group for all security scans
concurrency:
  group: security-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Backend security scanning
  backend-security:
    name: Backend Security Scan
    runs-on: ubuntu-latest
    if: contains(inputs.components, 'backend')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: 'fs'
          scan-ref: './backend'
          format: 'sarif'
          output: 'trivy-backend-results.sarif'
          severity: 'HIGH,CRITICAL'
        continue-on-error: true

      - name: Upload SARIF results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-backend-results.sarif'
          category: 'security-backend'
        continue-on-error: true

  # Frontend security scanning
  frontend-security:
    name: Frontend Security Scan
    runs-on: ubuntu-latest
    if: contains(inputs.components, 'frontend')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: 'fs'
          scan-ref: './frontend'
          format: 'sarif'
          output: 'trivy-frontend-results.sarif'
          severity: 'HIGH,CRITICAL'
        continue-on-error: true

      - name: Upload SARIF results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-frontend-results.sarif'
          category: 'security-frontend'
        continue-on-error: true

  # Infrastructure security scanning
  infrastructure-security:
    name: Infrastructure Security Scan
    runs-on: ubuntu-latest
    if: contains(inputs.components, 'infrastructure')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run tfsec security scanner
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: infrastructure/terraform
          format: sarif
          soft_fail: true
          additional_args: --out=tfsec-infrastructure-results.sarif
        continue-on-error: true

      - name: Upload SARIF results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'infrastructure/terraform/tfsec-infrastructure-results.sarif'
          category: 'security-infrastructure'
        continue-on-error: true

  # Optional code quality analysis
  backend-lint:
    name: Backend Code Quality
    runs-on: ubuntu-latest
    if: contains(inputs.components, 'backend') && inputs.include-lint-analysis == true

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3
        with:
          gradle-home-cache-cleanup: true
          cache-read-only: true

      - name: Run detekt analysis
        run: ./gradlew detekt
        continue-on-error: true

      - name: Upload detekt results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'backend/build/reports/detekt/detekt.sarif'
          category: 'detekt-backend'
        continue-on-error: true

  # Frontend lint analysis
  frontend-lint:
    name: Frontend Code Quality
    runs-on: ubuntu-latest
    if: contains(inputs.components, 'frontend') && inputs.include-lint-analysis == true

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint with SARIF output
        run: npm run lint -- --format=@microsoft/eslint-formatter-sarif --output-file=eslint-frontend-results.sarif
        continue-on-error: true

      - name: Upload ESLint SARIF results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'frontend/eslint-frontend-results.sarif'
          category: 'eslint-frontend'
        continue-on-error: true

  # Summary job
  scan-summary:
    name: Security Scan Summary
    runs-on: ubuntu-latest
    needs: [backend-security, frontend-security, infrastructure-security, backend-lint, frontend-lint]
    if: always()

    steps:
      - name: Generate scan summary
        run: |
          echo "## Security Scan Summary 🛡️" >> $GITHUB_STEP_SUMMARY
          echo "**Scanned Components:** ${{ inputs.components }}" >> $GITHUB_STEP_SUMMARY
          echo "**Code Quality Analysis:** ${{ inputs.include-lint-analysis }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Job status summary
          echo "### Job Results:" >> $GITHUB_STEP_SUMMARY
          echo "- Backend Security: ${{ needs.backend-security.result || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend Security: ${{ needs.frontend-security.result || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Infrastructure Security: ${{ needs.infrastructure-security.result || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Backend Lint: ${{ needs.backend-lint.result || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend Lint: ${{ needs.frontend-lint.result || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "*This consolidated scan saves ~60% in CI minutes compared to individual component scans*" >> $GITHUB_STEP_SUMMARY