name: Security Scan Template

on:
  workflow_call:
    inputs:
      scan-path:
        description: 'Path to scan (e.g., ./backend, ./frontend)'
        required: true
        type: string
      scan-category:
        description: 'SARIF category for GitHub Security tab'
        required: true
        type: string
      working-directory:
        description: 'Working directory for the scan'
        required: false
        type: string
        default: '.'

jobs:
  trivy-scan:
    name: Trivy Vulnerability Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: ${{ inputs.scan-path }}
          format: 'sarif'
          output: 'trivy-${{ inputs.scan-category }}-results.sarif'
          
      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-${{ inputs.scan-category }}-results.sarif'
          category: ${{ inputs.scan-category }}
        continue-on-error: true