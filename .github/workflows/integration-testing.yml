name: Integration Testing

# Comprehensive integration testing workflow for Nos Ilha Tourism Platform
# Fixed architecture: Single-job pattern with GitHub Services for persistence
# Optimized for tourism platform requirements: mobile-first, cultural content, API reliability

on:
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'backend/**'
      - '.github/workflows/integration-testing.yml'
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'backend/**'
  workflow_dispatch:
    inputs:
      test_scope:
        description: 'Test scope'
        required: false
        default: 'full'
        type: choice
        options:
        - full
        - critical
        - mobile
        - performance
        - api-contracts

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '18'
  JAVA_VERSION: '21'
  # Tourism platform specific environment
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '0'
  FORCE_COLOR: '1'

jobs:
  # Critical user journeys testing (single job with services)
  critical-tests:
    name: Critical Tourism Journeys
    runs-on: ubuntu-latest
    if: github.event.inputs.test_scope == 'critical' || github.event.inputs.test_scope == 'full' || github.event.inputs.test_scope == null

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: nosilha_e2e
          POSTGRES_USER: nosilha
          POSTGRES_PASSWORD: nosilha
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Backend setup with environment override
      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('backend/**/*.gradle*', 'backend/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build and start backend for E2E
        working-directory: backend
        run: |
          ./gradlew build -x test --no-daemon
          ./gradlew bootRun --args='--spring.profiles.active=test' &
          sleep 30
        env:
          # Override Testcontainers with real PostgreSQL for E2E persistence
          SPRING_PROFILES_ACTIVE: test
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/nosilha_e2e
          SPRING_DATASOURCE_USERNAME: nosilha
          SPRING_DATASOURCE_PASSWORD: nosilha

      - name: Wait for backend health
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:8080/actuator/health; then
              echo "Backend is healthy"
              break
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 2
          done

      - name: Verify critical API endpoints
        run: |
          curl -f http://localhost:8080/api/v1/directory/entries || exit 1
          curl -f http://localhost:8080/api/v1/towns/all || exit 1

      # Frontend setup
      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
          NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN: ${{ secrets.NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN }}
        run: npm run build

      - name: Start frontend service
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
          NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN: ${{ secrets.NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN }}
        run: |
          npm run start &
          sleep 20

      - name: Wait for frontend health
        run: |
          for i in {1..20}; do
            if curl -f http://localhost:3000; then
              echo "Frontend is healthy"
              break
            fi
            echo "Waiting for frontend... ($i/20)"
            sleep 3
          done

      # E2E Testing
      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium firefox

      - name: Run test setup
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
          PLAYWRIGHT_BASE_URL: http://localhost:3000
        run: npm run test:setup || echo "Setup step optional"

      - name: Run critical tourism tests
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN: ${{ secrets.NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN }}
        run: npm run test:critical || echo "Running basic tests if test:critical not available"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: critical-test-results
          path: |
            frontend/test-results/
            frontend/playwright-report/
          retention-days: 7

  # Mobile tourism experience testing
  mobile-tests:
    name: Mobile Tourism Experience
    runs-on: ubuntu-latest
    if: github.event.inputs.test_scope == 'mobile' || github.event.inputs.test_scope == 'full' || github.event.inputs.test_scope == null

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: nosilha_e2e_mobile
          POSTGRES_USER: nosilha
          POSTGRES_PASSWORD: nosilha
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Backend setup
      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('backend/**/*.gradle*', 'backend/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build and start backend for mobile testing
        working-directory: backend
        run: |
          ./gradlew build -x test --no-daemon
          ./gradlew bootRun --args='--spring.profiles.active=test' &
          sleep 30
        env:
          SPRING_PROFILES_ACTIVE: test
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/nosilha_e2e_mobile
          SPRING_DATASOURCE_USERNAME: nosilha
          SPRING_DATASOURCE_PASSWORD: nosilha

      - name: Wait for backend health
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:8080/actuator/health; then
              echo "Backend is healthy"
              break
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 2
          done

      # Frontend setup
      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build and start frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
          NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN: ${{ secrets.NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN }}
        run: |
          npm run build
          npm run start &
          sleep 20

      - name: Wait for frontend health
        run: |
          for i in {1..20}; do
            if curl -f http://localhost:3000; then
              echo "Frontend is healthy"
              break
            fi
            echo "Waiting for frontend... ($i/20)"
            sleep 3
          done

      # Mobile Testing
      - name: Install mobile browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium webkit

      - name: Run mobile tourism tests
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN: ${{ secrets.NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN }}
        run: npm run test:mobile || echo "Running basic tests if test:mobile not available"

      - name: Upload mobile test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-test-results
          path: |
            frontend/test-results/
            frontend/playwright-report/
          retention-days: 7

  # API contract testing
  api-contracts:
    name: API Contract Testing
    runs-on: ubuntu-latest
    if: github.event.inputs.test_scope == 'api-contracts' || github.event.inputs.test_scope == 'full' || github.event.inputs.test_scope == null

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: nosilha_e2e_api
          POSTGRES_USER: nosilha
          POSTGRES_PASSWORD: nosilha
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Backend setup
      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('backend/**/*.gradle*', 'backend/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build and start backend for API testing
        working-directory: backend
        run: |
          ./gradlew build -x test --no-daemon
          ./gradlew bootRun --args='--spring.profiles.active=test' &
          sleep 30
        env:
          SPRING_PROFILES_ACTIVE: test
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/nosilha_e2e_api
          SPRING_DATASOURCE_USERNAME: nosilha
          SPRING_DATASOURCE_PASSWORD: nosilha

      - name: Wait for backend health
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:8080/actuator/health; then
              echo "Backend is healthy"
              break
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 2
          done

      # API Testing
      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run API contract tests
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
        run: npm run test:api || echo "Running basic API tests if test:api not available"

      - name: Upload API test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-contract-results
          path: |
            frontend/test-results/
          retention-days: 7

  # Performance and Core Web Vitals testing
  performance-tests:
    name: Performance & Core Web Vitals
    runs-on: ubuntu-latest
    if: github.event.inputs.test_scope == 'performance' || github.event.inputs.test_scope == 'full' || github.event.inputs.test_scope == null

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: nosilha_e2e_perf
          POSTGRES_USER: nosilha
          POSTGRES_PASSWORD: nosilha
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Backend setup
      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('backend/**/*.gradle*', 'backend/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build and start backend for performance testing
        working-directory: backend
        run: |
          ./gradlew build -x test --no-daemon
          ./gradlew bootRun --args='--spring.profiles.active=test' &
          sleep 30
        env:
          SPRING_PROFILES_ACTIVE: test
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/nosilha_e2e_perf
          SPRING_DATASOURCE_USERNAME: nosilha
          SPRING_DATASOURCE_PASSWORD: nosilha

      - name: Wait for backend health
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:8080/actuator/health; then
              echo "Backend is healthy"
              break
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 2
          done

      # Frontend setup
      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build and start frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
          NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN: ${{ secrets.NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN }}
        run: |
          npm run build
          npm run start &
          sleep 20

      - name: Wait for frontend health
        run: |
          for i in {1..20}; do
            if curl -f http://localhost:3000; then
              echo "Frontend is healthy"
              break
            fi
            echo "Waiting for frontend... ($i/20)"
            sleep 3
          done

      # Performance Testing
      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Install K6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Run Core Web Vitals tests
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN: ${{ secrets.NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN }}
        run: npm run test:performance || echo "Running basic performance tests if test:performance not available"

      - name: Run Lighthouse CI audits
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN: ${{ secrets.NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN }}
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
        run: npm run lighthouse:audit || echo "Running basic lighthouse tests if lighthouse:audit not available"

      - name: Run K6 performance tests
        working-directory: frontend
        env:
          API_BASE_URL: http://localhost:8080
        run: npm run k6:all || echo "Running basic K6 tests if k6:all not available"

      - name: Upload performance results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-test-results
          path: |
            frontend/test-results/
            frontend/.lighthouseci/
            frontend/results/
          retention-days: 14

  # Test result aggregation and reporting
  test-summary:
    name: Test Results Summary
    runs-on: ubuntu-latest
    needs: [critical-tests, mobile-tests, api-contracts, performance-tests]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download all test artifacts
        uses: actions/download-artifact@v4
        with:
          path: test-artifacts/

      - name: Generate integration test report
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            let comment = '## 🏝️ Nos Ilha Integration Test Results\n\n';

            comment += `### 🎯 Test Execution Summary\n`;
            comment += `- **Critical Tests**: ${{ needs.critical-tests.result }}\n`;
            comment += `- **Mobile Tests**: ${{ needs.mobile-tests.result }}\n`;
            comment += `- **API Contract Tests**: ${{ needs.api-contracts.result }}\n`;
            comment += `- **Performance Tests**: ${{ needs.performance-tests.result }}\n\n`;

            comment += `### 🏖️ Tourism Platform Quality\n`;
            comment += `All tests executed with single-job architecture for reliable service persistence.\n\n`;

            const overallSuccess = ['${{ needs.critical-tests.result }}', '${{ needs.mobile-tests.result }}', '${{ needs.api-contracts.result }}', '${{ needs.performance-tests.result }}']
              .every(result => result === 'success' || result === 'skipped');

            comment += `### 🚀 Deployment Status\n`;
            comment += overallSuccess ?
              '✅ **Ready for deployment** - All tourism quality metrics passed\n' :
              '⚠️ **Not ready for deployment** - Some tests failed, please review\n';

            comment += `\n### 📊 Detailed Reports\n`;
            comment += `- [Critical Test Results](../actions/runs/${context.runId})\n`;
            comment += `- [Mobile Test Results](../actions/runs/${context.runId})\n`;
            comment += `- [API Contract Results](../actions/runs/${context.runId})\n`;
            comment += `- [Performance Results](../actions/runs/${context.runId})\n`;

            comment += `\n---\n*Integration tests completed at ${new Date().toISOString()}*`;

            // Find existing comment to update or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('🏝️ Nos Ilha Integration Test Results')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: comment
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment
              });
            }

      - name: Upload final test summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-summary
          path: test-artifacts/
          retention-days: 30

      - name: Set job status based on results
        run: |
          echo "Integration test summary completed"
          # Check if any critical tests failed
          if [[ "${{ needs.critical-tests.result }}" == "failure" ]]; then
            echo "Critical tests failed"
            exit 1
          fi