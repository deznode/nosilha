name: Setup GitHub Budget Alerts

# One-time setup workflow to configure budget alerts
# Run manually to set up budget monitoring
on:
  workflow_dispatch:
    inputs:
      budget_limit:
        description: 'Monthly budget limit (minutes)'
        required: true
        default: '1500'
        type: string
      notification_email:
        description: 'Email for budget notifications (optional - uses GitHub account email if not provided)'
        required: false
        type: string

jobs:
  setup-budget:
    name: Configure Budget Alerts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure budget alerts setup
        id: budget-setup
        run: |
          BUDGET_LIMIT="${{ github.event.inputs.budget_limit }}"
          NOTIFICATION_EMAIL="${{ github.event.inputs.notification_email }}"

          echo "🎯 Setting up budget alerts with limit: ${BUDGET_LIMIT} minutes/month"

          # Create budget configuration documentation
          cat > docs/monitoring/budget-configuration.md << EOF
          # GitHub Actions Budget Configuration

          ## Current Budget Settings

          **Budget Limit**: ${BUDGET_LIMIT} minutes/month
          **Notification Email**: ${NOTIFICATION_EMAIL:-"GitHub account email"}
          **Setup Date**: $(date -u)

          ## Alert Thresholds

          | Threshold | Minutes | Action |
          |-----------|---------|--------|
          | 50% | $(( BUDGET_LIMIT / 2 )) | Info notification |
          | 75% | $(( (BUDGET_LIMIT * 3) / 4 )) | Warning alert |
          | 90% | $(( (BUDGET_LIMIT * 9) / 10 )) | Critical alert + GitHub Issue |
          | 100% | ${BUDGET_LIMIT}+ | Review required |

          ## Manual Setup Required

          Since GitHub does not provide programmatic budget API access, manual setup is required:

          ### Step 1: Access GitHub Billing Settings
          1. Go to [GitHub Billing Settings](https://github.com/settings/billing)
          2. Navigate to "Billing & plans" > "Usage & quotas"

          ### Step 2: Set Up Budget Alerts
          1. Click on "GitHub Actions" usage section
          2. Set up spending alerts at the thresholds above
          3. Configure email notifications

          ### Step 3: Monitor Usage
          - Use the automated cost monitoring workflow for detailed tracking
          - Review monthly reports in this directory
          - Check for automated GitHub Issues on high usage

          ## Alternative: GitHub CLI Monitoring

          Since programmatic budget setup requires enterprise features, we use:
          1. **Automated Monitoring**: Monthly workflow reports usage
          2. **GitHub Issues**: Automatic alerts for high usage
          3. **Manual Budget**: Manual setup in GitHub settings (one-time)

          ## Budget Setup Commands (Manual)

          While GitHub CLI doesn't support budget setup for free accounts, you can:

          1. **Check current usage**:
             \`\`\`bash
             gh api /user/settings/billing/shared-storage
             gh api /user/settings/billing/actions
             \`\`\`

          2. **Monitor via workflow**: Use our automated cost-monitoring workflow

          ## Verification

          After manual setup:
          - [ ] Budget alerts configured in GitHub billing settings
          - [ ] Email notifications enabled
          - [ ] Cost monitoring workflow tested
          - [ ] Team notified of budget limits

          ---
          *Generated by setup-budget-alerts workflow*
          EOF

          echo "budget_limit=${BUDGET_LIMIT}" >> $GITHUB_OUTPUT
          echo "config_created=true" >> $GITHUB_OUTPUT

      - name: Create budget monitoring instructions
        run: |
          echo "📋 Budget Configuration Instructions"
          echo "================================="
          echo ""
          echo "Since GitHub's budget API requires enterprise features, manual setup is needed:"
          echo ""
          echo "1. 🌐 Visit: https://github.com/settings/billing"
          echo "2. 📊 Navigate to 'Usage & quotas' > 'GitHub Actions'"
          echo "3. ⚠️ Set up spending alerts at:"
          echo "   - 50% ($(( ${{ steps.budget-setup.outputs.budget_limit }} / 2 )) minutes)"
          echo "   - 75% ($(( (${{ steps.budget-setup.outputs.budget_limit }} * 3) / 4 )) minutes)"
          echo "   - 90% ($(( (${{ steps.budget-setup.outputs.budget_limit }} * 9) / 10 )) minutes)"
          echo "4. 📧 Configure email notifications"
          echo ""
          echo "✅ Automated monitoring is now active via cost-monitoring.yml workflow"
          echo "📁 Configuration saved to docs/monitoring/budget-configuration.md"

      - name: Test cost monitoring workflow access
        run: |
          echo "🧪 Testing GitHub API access for cost monitoring..."

          # Test GitHub Actions API access
          echo "Testing workflow runs API..."
          gh api repos/${{ github.repository }}/actions/runs --limit 5 > /dev/null
          echo "✅ Workflow runs API access confirmed"

          # Test repository access
          echo "Testing repository API..."
          gh api repos/${{ github.repository }} > /dev/null
          echo "✅ Repository API access confirmed"

          # Test issues API (for automated alerts)
          echo "Testing issues API..."
          gh api repos/${{ github.repository }}/issues --limit 1 > /dev/null
          echo "✅ Issues API access confirmed"

          echo ""
          echo "🎉 All API endpoints accessible - cost monitoring ready!"

        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create setup completion issue
        uses: actions/github-script@v7
        with:
          script: |
            const budgetLimit = '${{ steps.budget-setup.outputs.budget_limit }}';

            const title = '✅ GitHub Actions Budget Monitoring Setup Complete';

            const body = `## 🎯 Budget Monitoring Configuration

            **Budget Limit**: ${budgetLimit} minutes/month
            **Setup Date**: ${new Date().toISOString().split('T')[0]}
            **Status**: ✅ Automated monitoring active

            ## 📋 Manual Setup Required

            Since GitHub's budget API requires enterprise features, please complete the manual setup:

            ### Step 1: Configure Budget Alerts
            1. Visit [GitHub Billing Settings](https://github.com/settings/billing)
            2. Navigate to "Usage & quotas" > "GitHub Actions"
            3. Set up spending alerts at:
               - **50%**: ${Math.floor(budgetLimit / 2)} minutes (Info)
               - **75%**: ${Math.floor((budgetLimit * 3) / 4)} minutes (Warning)
               - **90%**: ${Math.floor((budgetLimit * 9) / 10)} minutes (Critical)
            4. Enable email notifications

            ### Step 2: Verify Setup
            - [ ] Budget alerts configured in GitHub settings
            - [ ] Email notifications enabled
            - [ ] Test cost monitoring workflow (manual trigger)

            ## 🤖 Automated Features Active

            ✅ **Monthly Reports**: Automatic usage analysis on 1st of each month
            ✅ **GitHub Issues**: Automated alerts for high usage (75%+ threshold)
            ✅ **Performance Tracking**: Workflow efficiency monitoring
            ✅ **Historical Data**: Monthly reports saved to docs/monitoring/

            ## 📊 Monitoring Dashboard

            - **Latest Report**: [docs/monitoring/latest-usage-report.md](./docs/monitoring/latest-usage-report.md)
            - **Configuration**: [docs/monitoring/budget-configuration.md](./docs/monitoring/budget-configuration.md)
            - **Documentation**: [docs/monitoring/README.md](./docs/monitoring/README.md)

            ## 🚀 Next Steps

            1. Complete manual budget setup (Step 1 above)
            2. Test the cost monitoring by running: \`cost-monitoring.yml\` workflow
            3. Review generated reports and verify alert thresholds
            4. Close this issue once setup is verified

            ---
            *This issue was automatically created by the setup-budget-alerts workflow*`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['monitoring', 'setup', 'github-actions']
            });

      - name: Summary
        run: |
          echo "🎉 GitHub Actions Budget Monitoring Setup Complete!"
          echo ""
          echo "✅ Automated monitoring workflow created"
          echo "✅ Budget configuration documented"
          echo "✅ API access verified"
          echo "✅ Setup instructions created"
          echo ""
          echo "📋 Manual action required:"
          echo "   Visit GitHub billing settings to configure budget alerts"
          echo ""
          echo "📊 Monthly monitoring will begin automatically"
          echo "🔗 Check the created GitHub issue for detailed setup instructions"