name: PR Validation

# NOTE: SARIF upload steps, CodeQL analysis, and Dependency Review use continue-on-error: true
# to handle repositories without GitHub Advanced Security enabled. This prevents workflow failures
# while still attempting to run security analysis when available.
#
# For private repositories, these jobs require GitHub Advanced Security license:
# - CodeQL Analysis (security scanning)
# - Dependency Review (vulnerability checking)
# - SARIF uploads (security results)
#
# These jobs will run but fail gracefully if Advanced Security is not available,
# allowing the PR validation to complete successfully.

on:
  pull_request:
    branches: [main]
  pull_request_target:
    branches: [main]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes (Nx Affected)
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.affected.outputs.api }}
      frontend: ${{ steps.affected.outputs.web }}
      infrastructure: ${{ steps.infra.outputs.infrastructure }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Detect affected Nx projects
        id: affected
        run: |
          # Get the list of affected projects (one per line)
          AFFECTED=$(pnpm nx show projects --affected --base=origin/main --head=HEAD 2>/dev/null || echo "")
          echo "Affected projects:"
          echo "$AFFECTED"

          # Check if specific projects are affected (exact line match)
          if echo "$AFFECTED" | grep -qxF "api"; then
            echo "api=true" >> $GITHUB_OUTPUT
            echo "API project is affected"
          else
            echo "api=false" >> $GITHUB_OUTPUT
            echo "API project is NOT affected"
          fi

          if echo "$AFFECTED" | grep -qxF "web"; then
            echo "web=true" >> $GITHUB_OUTPUT
            echo "Web project is affected"
          else
            echo "web=false" >> $GITHUB_OUTPUT
            echo "Web project is NOT affected"
          fi

      - name: Detect infrastructure changes
        id: infra
        run: |
          # Infrastructure is not managed by Nx, use git diff for detection
          if git diff --name-only origin/main...HEAD | grep -q "^infrastructure/"; then
            echo "infrastructure=true" >> $GITHUB_OUTPUT
          else
            echo "infrastructure=false" >> $GITHUB_OUTPUT
          fi

  # Call the individual service workflows for PR validation
  backend-validation:
    name: Backend Validation
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    uses: ./.github/workflows/backend-ci.yml
    secrets: inherit
    with:
      skip-deploy: true

  frontend-validation:
    name: Frontend Validation  
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    uses: ./.github/workflows/frontend-ci.yml
    secrets: inherit
    with:
      skip-deploy: true

  infrastructure-validation:
    name: Infrastructure Validation
    needs: changes
    if: needs.changes.outputs.infrastructure == 'true'
    uses: ./.github/workflows/infrastructure-ci.yml
    secrets: inherit
    with:
      skip-deploy: true

  # Global security scan for the entire repository
  global-security-scan:
    name: Global Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Run Trivy vulnerability scanner (full repository)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: 'fs'
          format: 'sarif'
          output: 'trivy-global-results.sarif'
          



  # Comprehensive PR status reporting
  pr-status-report:
    name: PR Status Report
    runs-on: ubuntu-latest
    needs: [
      changes,
      backend-validation,
      frontend-validation, 
      infrastructure-validation,
      global-security-scan
    ]
    if: always() && github.event_name == 'pull_request'
    
    steps:
      - name: Generate PR Status Report
        uses: actions/github-script@v7
        with:
          script: |
            const results = {
              'Backend Validation': '${{ needs.backend-validation.result }}',
              'Frontend Validation': '${{ needs.frontend-validation.result }}',
              'Infrastructure Validation': '${{ needs.infrastructure-validation.result }}',
              'Global Security Scan': '${{ needs.global-security-scan.result }}'
            };
            
            const changes = {
              backend: '${{ needs.changes.outputs.backend }}' === 'true',
              frontend: '${{ needs.changes.outputs.frontend }}' === 'true',
              infrastructure: '${{ needs.changes.outputs.infrastructure }}' === 'true'
            };
            
            let comment = '## 🚀 PR Validation Results\n\n';

            // Changes summary
            comment += '### 📁 Components Changed:\n';
            if (changes.backend) comment += '- ✅ **Backend** (Spring Boot/Kotlin)\n';
            if (changes.frontend) comment += '- ✅ **Frontend** (Next.js/React - TypeScript + ESLint only)\n';
            if (changes.infrastructure) comment += '- ✅ **Infrastructure** (Terraform)\n';
            if (!changes.backend && !changes.frontend && !changes.infrastructure) {
              comment += '- ℹ️ No core component changes detected\n';
            }
            comment += '\n';
            
            // Validation results
            comment += '### 🔍 Validation Results:\n';
            let allPassed = true;
            let hasFailures = false;
            
            for (const [check, result] of Object.entries(results)) {
              if (result === 'skipped') {
                comment += `⏭️ **${check}**: Skipped (no relevant changes)\n`;
                continue;
              }
              
              
              const icon = result === 'success' ? '✅' : '❌';
              comment += `${icon} **${check}**: ${result}\n`;
              
              if (result === 'failure') {
                allPassed = false;
                hasFailures = true;
              } else if (result !== 'success' && result !== 'failure') {
                allPassed = false;
              }
            }
            
            comment += '\n';
            
            // Summary and next steps
            if (allPassed) {
              comment += '### 🎉 Status: READY FOR REVIEW\n';
              comment += 'All validation checks have passed successfully! This PR is ready for code review and merge.\n\n';
              comment += '**Next Steps:**\n';
              comment += '- 👀 Request code review from team members\n';
              comment += '- 🔄 Merge when approved (will trigger deployment)\n';
              if (changes.frontend) {
                comment += '\n**Frontend Testing Note:** E2E tests (Playwright) available locally: `pnpm run test:e2e`\n';
              }
            } else if (hasFailures) {
              comment += '### ⚠️ Status: CHANGES REQUIRED\n';
              comment += 'Some validation checks have failed. Please review and fix the issues above.\n\n';
              comment += '**Action Required:**\n';
              comment += '- 🔧 Fix the failing validation checks\n';
              comment += '- 🔄 Push changes to re-trigger validation\n';
              comment += '- ✅ Ensure all checks pass before requesting review\n';
            } else {
              comment += '### ⏳ Status: IN PROGRESS\n';
              comment += 'Some validation checks are still running or were cancelled.\n\n';
              comment += '**Please wait for:**\n';
              comment += '- ⏱️ All checks to complete\n';
              comment += '- ✅ Successful validation results\n';
            }

            comment += '\n---\n';
            comment += `*Updated: ${new Date().toISOString()} | PR: #${context.issue.number}*`;
            comment += '\n*Change detection: Nx affected | Frontend CI: TypeScript + ESLint only | E2E tests available locally*';
            
            // Find existing comment to update or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('🚀 PR Validation Results')
            );
            
            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: comment
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment
              });
            }

  # Auto-merge for Dependabot PRs
  dependabot-auto-merge:
    name: Dependabot Auto-merge
    runs-on: ubuntu-latest
    needs: [
      backend-validation,
      frontend-validation,
      infrastructure-validation,
      global-security-scan
    ]
    if: |
      always() && 
      github.event_name == 'pull_request' &&
      github.actor == 'dependabot[bot]' &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
      
    steps:
      - name: Enable auto-merge for Dependabot PRs
        run: gh pr merge --auto --merge "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Approve Dependabot PR
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}