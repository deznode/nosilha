name: Infrastructure CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'infrastructure/**'
      - '.github/workflows/infrastructure-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'infrastructure/**'
      - '.github/workflows/infrastructure-ci.yml'
  workflow_call:
    inputs:
      skip-deploy:
        description: 'Skip deployment steps'
        required: false
        type: boolean
        default: false
  workflow_dispatch:

env:
  TF_VERSION: "1.6.0"
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

jobs:
  security-scan:
    name: Infrastructure Security Scanning
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./infrastructure/terraform
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Run tfsec security scanner
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: infrastructure/terraform
          format: sarif
          soft_fail: true
          additional_args: --out=tfsec.sarif
          
      - name: Upload tfsec scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: infrastructure/terraform/tfsec.sarif
          category: 'infrastructure-tfsec'

  validate:
    name: Terraform Validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./infrastructure/terraform
        
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false
          
      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true
        
      - name: Terraform Init
        id: init
        run: terraform init -backend=false
        
      - name: Terraform Validate
        id: validate
        run: terraform validate

  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: [security-scan, validate]
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: ./infrastructure/terraform
    outputs:
      plan-output: ${{ steps.plan.outputs.stdout }}
        
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false
          
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          
      - name: Terraform Init
        run: terraform init
        
      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan
        continue-on-error: true
        
      - name: Save Plan Output
        run: terraform show -no-color tfplan > plan-output.txt
        
      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: infrastructure/terraform/plan-output.txt

  plan-comment:
    name: Comment Terraform Plan on PR
    runs-on: ubuntu-latest
    needs: [plan]
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan
          path: ./
          
      - name: Comment PR with Plan
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('plan-output.txt', 'utf8');
            const maxLength = 60000; // GitHub comment limit
            
            let planOutput = plan;
            if (plan.length > maxLength) {
              planOutput = plan.substring(0, maxLength) + '\n\n... (truncated)';
            }
            
            const output = `#### Terraform Plan 📖
            
            <details><summary>Show Plan (Click to expand)</summary>
            
            \`\`\`hcl
            ${planOutput}
            \`\`\`
            
            </details>
            
            *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: [security-scan, validate]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && !inputs.skip-deploy
    environment: production
    defaults:
      run:
        working-directory: ./infrastructure/terraform
        
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          
      - name: Terraform Init
        run: terraform init
        
      - name: Terraform Plan
        run: terraform plan -out=tfplan
        
      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        
      - name: Output Infrastructure Details
        run: |
          echo "## Infrastructure Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "### Resources Applied:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          terraform state list >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  drift-detection:
    name: Configuration Drift Detection
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: ./infrastructure/terraform
        
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false
          
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          
      - name: Terraform Init
        run: terraform init
        
      - name: Check for Configuration Drift
        id: drift
        run: |
          terraform plan -detailed-exitcode -no-color > drift-output.txt
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true
        
      - name: Create Issue for Drift Detection
        if: steps.drift.outputs.exit_code == '2'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const drift = fs.readFileSync('infrastructure/terraform/drift-output.txt', 'utf8');
            
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Infrastructure Configuration Drift Detected',
              body: `## Configuration Drift Detected
              
              Terraform has detected drift between the expected infrastructure configuration and actual resources.
              
              ### Drift Details:
              \`\`\`hcl
              ${drift}
              \`\`\`
              
              Please review and address these changes to maintain infrastructure consistency.
              
              **Action Required:** Review the changes and either:
              1. Update the Terraform configuration to match the current state, or  
              2. Apply the configuration to restore the expected state
              
              *Generated by: Configuration Drift Detection workflow*`,
              labels: ['infrastructure', 'urgent', 'drift-detection']
            });
            
      - name: Notify on Success
        if: steps.drift.outputs.exit_code == '0'
        run: echo "✅ No configuration drift detected - infrastructure is in sync"