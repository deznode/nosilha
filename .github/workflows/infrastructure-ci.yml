name: Infrastructure CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'infrastructure/**'
      - '.github/workflows/infrastructure-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'infrastructure/**'
      - '.github/workflows/infrastructure-ci.yml'
  workflow_call:
    inputs:
      skip-deploy:
        description: 'Skip deployment steps'
        required: false
        type: boolean
        default: false
  workflow_dispatch:

env:
  TF_VERSION: "1.12.2"
  TF_VAR_gcp_project_id: ${{ secrets.GCP_PROJECT_ID }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-scan:
    name: Infrastructure Security Scanning
    uses: ./.github/workflows/reusable-security-scan.yml
    with:
      components: 'infrastructure'
      include-lint-analysis: false
          

  validate:
    name: Terraform Validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./infrastructure/terraform

    steps:
      - uses: actions/checkout@v4

      - name: Cache Terraform providers
        uses: actions/cache@v4
        with:
          path: ~/.terraform.d/plugin-cache
          key: ${{ runner.os }}-terraform-${{ hashFiles('infrastructure/terraform/**/.terraform.lock.hcl') }}
          restore-keys: |
            ${{ runner.os }}-terraform-

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false
        env:
          TF_PLUGIN_CACHE_DIR: ~/.terraform.d/plugin-cache
          
      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true
        
      - name: Terraform Init
        id: init
        run: terraform init -backend=false
        
      - name: Terraform Validate
        id: validate
        run: terraform validate

  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: [security-scan, validate]
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: ./infrastructure/terraform
    outputs:
      plan-output: ${{ steps.plan.outputs.stdout }}

    # Add OIDC permissions
    permissions:
      contents: read
      id-token: write  # Required for OIDC token requests

    steps:
      - uses: actions/checkout@v4

      - name: Cache Terraform providers
        uses: actions/cache@v4
        with:
          path: ~/.terraform.d/plugin-cache
          key: ${{ runner.os }}-terraform-${{ hashFiles('infrastructure/terraform/**/.terraform.lock.hcl') }}
          restore-keys: |
            ${{ runner.os }}-terraform-

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false
        env:
          TF_PLUGIN_CACHE_DIR: ~/.terraform.d/plugin-cache

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/936816281178/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider'
          service_account: 'nosilha-cicd-deployer@nosilha.iam.gserviceaccount.com'

      - name: Terraform Init
        run: terraform init -reconfigure
        
      - name: Handle existing state locks
        run: |
          echo "Checking for existing Terraform locks..."
          # Force unlock the specific problematic lock if it exists
          terraform force-unlock -force 1752177952260121 || true
          # General lock cleanup - extract any lock ID and unlock
          LOCK_OUTPUT=$(terraform plan 2>&1 || true)
          if echo "$LOCK_OUTPUT" | grep -q "Error acquiring the state lock"; then
            echo "Lock detected, attempting cleanup..."
            LOCK_ID=$(echo "$LOCK_OUTPUT" | grep -A 10 "Lock Info:" | grep "ID:" | awk '{print $2}' | head -n1)
            if [ -n "$LOCK_ID" ]; then
              echo "Unlocking state with ID: $LOCK_ID"
              terraform force-unlock -force "$LOCK_ID" || true
              sleep 5
            fi
          else
            echo "No lock detected, proceeding..."
          fi
        continue-on-error: true
        
      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan
        continue-on-error: true
        
      - name: Save Plan Output
        run: terraform show -no-color tfplan > plan-output.txt
        
      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: infrastructure/terraform/plan-output.txt
          
      - name: Cleanup locks on failure
        if: failure()
        run: |
          echo "Workflow failed, cleaning up any remaining locks..."
          # Try to extract and unlock any remaining lock IDs
          LOCK_OUTPUT=$(terraform plan 2>&1 || true)
          if echo "$LOCK_OUTPUT" | grep -q "Lock Info:"; then
            LOCK_ID=$(echo "$LOCK_OUTPUT" | grep -A 10 "Lock Info:" | grep "ID:" | awk '{print $2}' | head -n1)
            if [ -n "$LOCK_ID" ]; then
              echo "Force unlocking state with ID: $LOCK_ID"
              terraform force-unlock -force "$LOCK_ID" || true
            fi
          fi
        continue-on-error: true

  plan-comment:
    name: Comment Terraform Plan on PR
    runs-on: ubuntu-latest
    needs: [plan]
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan
          path: ./
          
      - name: Comment PR with Plan
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('plan-output.txt', 'utf8');
            const maxLength = 60000; // GitHub comment limit
            
            let planOutput = plan;
            if (plan.length > maxLength) {
              planOutput = plan.substring(0, maxLength) + '\n\n... (truncated)';
            }
            
            const output = `#### Terraform Plan 📖
            
            <details><summary>Show Plan (Click to expand)</summary>
            
            \`\`\`hcl
            ${planOutput}
            \`\`\`
            
            </details>
            
            *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: [security-scan, validate]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && !inputs.skip-deploy
    environment: production
    defaults:
      run:
        working-directory: ./infrastructure/terraform

    # Add OIDC permissions
    permissions:
      contents: read
      id-token: write  # Required for OIDC token requests

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/936816281178/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider'
          service_account: 'nosilha-cicd-deployer@nosilha.iam.gserviceaccount.com'

      - name: Terraform Init
        run: terraform init -reconfigure
        
      - name: Handle existing state locks
        run: |
          echo "Checking for existing Terraform locks..."
          # Force unlock the specific problematic lock if it exists
          terraform force-unlock -force 1752177952260121 || true
          # General lock cleanup - extract any lock ID and unlock
          LOCK_OUTPUT=$(terraform plan 2>&1 || true)
          if echo "$LOCK_OUTPUT" | grep -q "Error acquiring the state lock"; then
            echo "Lock detected, attempting cleanup..."
            LOCK_ID=$(echo "$LOCK_OUTPUT" | grep -A 10 "Lock Info:" | grep "ID:" | awk '{print $2}' | head -n1)
            if [ -n "$LOCK_ID" ]; then
              echo "Unlocking state with ID: $LOCK_ID"
              terraform force-unlock -force "$LOCK_ID" || true
              sleep 5
            fi
          else
            echo "No lock detected, proceeding..."
          fi
        continue-on-error: true
        
      - name: Terraform Plan with retry
        run: |
          MAX_RETRIES=3
          RETRY_COUNT=0
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            echo "Terraform plan attempt $((RETRY_COUNT + 1))/$MAX_RETRIES"
            
            if terraform plan -out=tfplan; then
              echo "Terraform plan succeeded"
              exit 0
            else
              RETRY_COUNT=$((RETRY_COUNT + 1))
              if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                echo "Plan failed, retrying in 10 seconds..."
                sleep 10
                # Try to clear any potential locks before retry
                terraform force-unlock -force $(terraform plan 2>&1 | grep "ID:" | awk '{print $2}' | head -n1) || true
              else
                echo "All retry attempts failed"
                exit 1
              fi
            fi
          done
        
      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        
      - name: Output Infrastructure Details
        run: |
          echo "## Infrastructure Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "### Resources Applied:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          terraform state list >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          
      - name: Cleanup locks on failure
        if: failure()
        run: |
          echo "Workflow failed, cleaning up any remaining locks..."
          # Try to extract and unlock any remaining lock IDs
          LOCK_OUTPUT=$(terraform plan 2>&1 || true)
          if echo "$LOCK_OUTPUT" | grep -q "Lock Info:"; then
            LOCK_ID=$(echo "$LOCK_OUTPUT" | grep -A 10 "Lock Info:" | grep "ID:" | awk '{print $2}' | head -n1)
            if [ -n "$LOCK_ID" ]; then
              echo "Force unlocking state with ID: $LOCK_ID"
              terraform force-unlock -force "$LOCK_ID" || true
            fi
          fi
        continue-on-error: true

  drift-detection:
    name: Configuration Drift Detection
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: ./infrastructure/terraform

    # Add OIDC permissions
    permissions:
      contents: read
      id-token: write  # Required for OIDC token requests

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/936816281178/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider'
          service_account: 'nosilha-cicd-deployer@nosilha.iam.gserviceaccount.com'

      - name: Terraform Init
        run: terraform init -reconfigure
        
      - name: Handle existing state locks
        run: |
          echo "Checking for existing Terraform locks..."
          # Force unlock the specific problematic lock if it exists
          terraform force-unlock -force 1752177952260121 || true
          # General lock cleanup - extract any lock ID and unlock
          LOCK_OUTPUT=$(terraform plan 2>&1 || true)
          if echo "$LOCK_OUTPUT" | grep -q "Error acquiring the state lock"; then
            echo "Lock detected, attempting cleanup..."
            LOCK_ID=$(echo "$LOCK_OUTPUT" | grep -A 10 "Lock Info:" | grep "ID:" | awk '{print $2}' | head -n1)
            if [ -n "$LOCK_ID" ]; then
              echo "Unlocking state with ID: $LOCK_ID"
              terraform force-unlock -force "$LOCK_ID" || true
              sleep 5
            fi
          else
            echo "No lock detected, proceeding..."
          fi
        continue-on-error: true
        
      - name: Check for Configuration Drift
        id: drift
        run: |
          terraform plan -detailed-exitcode -no-color > drift-output.txt
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true
        
      - name: Create Issue for Drift Detection
        if: steps.drift.outputs.exit_code == '2'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const drift = fs.readFileSync('infrastructure/terraform/drift-output.txt', 'utf8');
            
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Infrastructure Configuration Drift Detected',
              body: `## Configuration Drift Detected
              
              Terraform has detected drift between the expected infrastructure configuration and actual resources.
              
              ### Drift Details:
              \`\`\`hcl
              ${drift}
              \`\`\`
              
              Please review and address these changes to maintain infrastructure consistency.
              
              **Action Required:** Review the changes and either:
              1. Update the Terraform configuration to match the current state, or  
              2. Apply the configuration to restore the expected state
              
              *Generated by: Configuration Drift Detection workflow*`,
              labels: ['infrastructure', 'urgent', 'drift-detection']
            });
            
      - name: Notify on Success
        if: steps.drift.outputs.exit_code == '0'
        run: echo "✅ No configuration drift detected - infrastructure is in sync"
        
      - name: Cleanup locks on failure
        if: failure()
        run: |
          echo "Workflow failed, cleaning up any remaining locks..."
          # Try to extract and unlock any remaining lock IDs
          LOCK_OUTPUT=$(terraform plan 2>&1 || true)
          if echo "$LOCK_OUTPUT" | grep -q "Lock Info:"; then
            LOCK_ID=$(echo "$LOCK_OUTPUT" | grep -A 10 "Lock Info:" | grep "ID:" | awk '{print $2}' | head -n1)
            if [ -n "$LOCK_ID" ]; then
              echo "Force unlocking state with ID: $LOCK_ID"
              terraform force-unlock -force "$LOCK_ID" || true
            fi
          fi
        continue-on-error: true