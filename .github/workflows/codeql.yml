name: "CodeQL Analysis (Scheduled)"

# WARNING: This workflow requires GitHub Advanced Security to be enabled
# If Advanced Security is not enabled, this workflow will fail gracefully
# For private repositories, Advanced Security requires a paid license
# For public repositories, Advanced Security is available for free
# 
# The workflow uses continue-on-error to prevent failures when Advanced Security
# is not available, allowing the workflow to complete without blocking other processes
# 
# This workflow provides scheduled security scanning complementary to the
# CodeQL analysis in PR validation workflow

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '30 3 * * 1'  # Run weekly on Monday at 3:30 AM UTC

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 360
    continue-on-error: true  # Don't fail if Advanced Security is not available
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript', 'java' ]
        # CodeQL supports [ 'cpp', 'csharp', 'go', 'java', 'javascript', 'python', 'ruby', 'swift' ]
        # Use only 'java' for Kotlin as it's Kotlin/JVM, and 'javascript' for TypeScript

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Java 21 (for Kotlin backend)
      if: matrix.language == 'java'
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Set up Node.js (for TypeScript frontend)
      if: matrix.language == 'javascript'
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        config-file: ./.github/codeql/codeql-config.yml

    # Autobuild attempts to build any compiled languages (C/C++, C#, Go, Java, or Swift).
    # For this repository, we need to handle Kotlin (Java) backend and TypeScript frontend separately
    - name: Autobuild
      uses: github/codeql-action/autobuild@v3

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:${{matrix.language}}"