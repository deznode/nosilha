name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
      - '.github/workflows/reusable-security-scan.yml'
      # Exclude documentation and non-functional changes to save costs
      - '!backend/**/*.md'
      - '!backend/**/*.txt'
      - '!backend/**/*.gitignore'
      - '!backend/**/README*'
      - '!backend/**/.editorconfig'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
      - '.github/workflows/reusable-security-scan.yml'
      # Exclude documentation and non-functional changes to save costs
      - '!backend/**/*.md'
      - '!backend/**/*.txt'
      - '!backend/**/*.gitignore'
      - '!backend/**/README*'
      - '!backend/**/.editorconfig'
  workflow_call:
    inputs:
      skip-deploy:
        description: 'Skip deployment steps'
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy to production'
        required: true
        default: false
        type: boolean

env:
  REGISTRY: us-east1-docker.pkg.dev
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-east1
  SERVICE_NAME: nosilha-backend-api
  IMAGE_TAG: ${{ github.sha }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-scan:
    name: Security Scanning
    uses: ./.github/workflows/reusable-security-scan.yml
    with:
      components: 'backend'
      include-lint-analysis: true

  test-and-lint:
    name: Tests & Code Quality
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3
        with:
          gradle-home-cache-cleanup: true
          cache-read-only: ${{ github.event_name == 'pull_request' }}
          dependency-graph: 'generate-and-submit'

      # Run comprehensive tests with production Java version
      - name: Run tests and code quality
        run: |
          ./gradlew detekt --no-daemon &
          ./gradlew test --no-daemon &
          ./gradlew integrationTest --no-daemon &
          wait
        env:
          SPRING_PROFILES_ACTIVE: test

  # Cost-optimization: detect if changes are substantial enough to warrant build
  change-detection:
    name: Detect Changes
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && !inputs.skip-deploy && !github.event.pull_request.draft
    outputs:
      backend-code-changed: ${{ steps.changes.outputs.backend-code-changed }}
      only-docs: ${{ steps.changes.outputs.only-docs }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Need previous commit to compare

      - name: Check for substantial changes
        id: changes
        run: |
          # Check if only documentation/config files changed
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD | grep "^backend/" || true)

          # Count substantial vs documentation changes
          SUBSTANTIAL_CHANGES=0
          DOC_CHANGES=0

          while IFS= read -r file; do
            if [[ "$file" =~ \.(md|txt|gitignore|editorconfig)$ ]] || [[ "$file" =~ README ]]; then
              DOC_CHANGES=$((DOC_CHANGES + 1))
            else
              SUBSTANTIAL_CHANGES=$((SUBSTANTIAL_CHANGES + 1))
            fi
          done <<< "$CHANGED_FILES"

          # Determine if we should skip expensive operations
          if [[ $SUBSTANTIAL_CHANGES -gt 0 ]]; then
            echo "backend-code-changed=true" >> $GITHUB_OUTPUT
            echo "only-docs=false" >> $GITHUB_OUTPUT
            echo "✅ Substantial backend changes detected: $SUBSTANTIAL_CHANGES files"
          else
            echo "backend-code-changed=false" >> $GITHUB_OUTPUT
            echo "only-docs=true" >> $GITHUB_OUTPUT
            echo "⏭️ Only documentation changes detected: $DOC_CHANGES files"
          fi

  build:
    name: Build & Package
    runs-on: ubuntu-latest
    needs: [security-scan, test-and-lint, change-detection]
    # Skip build if only documentation changes (save costs)
    if: needs.change-detection.outputs.backend-code-changed == 'true'
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    defaults:
      run:
        working-directory: ./backend

    # Add OIDC permissions
    permissions:
      contents: read
      id-token: write  # Required for OIDC token requests

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3
        with:
          gradle-home-cache-cleanup: true
          cache-read-only: ${{ github.event_name == 'pull_request' }}
          dependency-graph: generate-and-submit

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/936816281178/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider'
          service_account: 'nosilha-cicd-deployer@nosilha.iam.gserviceaccount.com'
          
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }}
        
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/nosilha-backend/nosilha-core-api
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
            
      - name: Build and push Docker image
        id: build
        run: |
          # Build image locally first
          ./gradlew bootBuildImage --no-daemon \
            --imageName=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/nosilha-backend/nosilha-core-api:${{ github.sha }}
          
          # Push the image using Docker CLI (which uses the gcloud auth)
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/nosilha-backend/nosilha-core-api:${{ github.sha }}
          
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            docker tag ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/nosilha-backend/nosilha-core-api:${{ github.sha }} \
              ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/nosilha-backend/nosilha-core-api:latest
            docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/nosilha-backend/nosilha-core-api:latest
          fi

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && needs.build.result == 'success' && !inputs.skip-deploy
    environment: production

    # Add OIDC permissions
    permissions:
      contents: read
      id-token: write  # Required for OIDC token requests

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/936816281178/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider'
          service_account: 'nosilha-cicd-deployer@nosilha.iam.gserviceaccount.com'
          
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        
      - name: Deploy to Cloud Run (Production)
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/nosilha-backend/nosilha-core-api:${{ github.sha }} \
            --platform=managed \
            --region=${{ env.REGION }} \
            --allow-unauthenticated \
            --service-account=nosilha-backend-runner@${{ env.PROJECT_ID }}.iam.gserviceaccount.com \
            --set-env-vars="SPRING_PROFILES_ACTIVE=production" \
            --memory=256Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=3 \
            --timeout=300
            
      - name: Health Check
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} --region=${{ env.REGION }} --format='value(status.url)')
          echo "Service URL: $SERVICE_URL"
          
          # Wait for service to be ready
          sleep 30
          
          # Basic health check
          curl -f "$SERVICE_URL/actuator/health" || (echo "Health check failed" && exit 1)