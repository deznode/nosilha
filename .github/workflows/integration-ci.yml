name: Integration & End-to-End

# Simplified Integration Testing: Security validation and health checks only
# Frontend E2E tests moved to local development (not in CI)
# Focus: Backend integration, security headers, deployment health

on:
  # Cost optimization: removed push trigger — tests already run in backend-ci.yml
  # Use workflow_dispatch for on-demand runs, schedule for weekly regression
  workflow_dispatch:
    inputs:
      run_tests:
        description: 'Run integration tests'
        required: true
        default: true
        type: boolean
  schedule:
    # Run integration tests weekly on Mondays at 6 AM UTC (cost optimization)
    - cron: '0 6 * * 1'

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-east1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect what services have changed
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      frontend: ${{ steps.changes.outputs.frontend }}
      infrastructure: ${{ steps.changes.outputs.infrastructure }}
      any-service: ${{ (steps.changes.outputs.backend == 'true') || (steps.changes.outputs.frontend == 'true') }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            backend:
              - 'apps/api/**'
            frontend:
              - 'apps/web/**'
            infrastructure:
              - 'infrastructure/**'

  # API Integration Tests
  api-integration-tests:
    name: API Integration Tests
    runs-on: ubuntu-latest
    needs: [changes]
    if: always() && (needs.changes.outputs.backend == 'true' || github.event_name == 'schedule')

    steps:
      - uses: actions/checkout@v7

      - name: Setup Java & Gradle
        uses: ./.github/actions/setup-java-gradle
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      # Enable Testcontainers optimizations
      - name: Configure Testcontainers
        run: |
          echo "TESTCONTAINERS_REUSE_ENABLE=true" >> $GITHUB_ENV
          echo "TESTCONTAINERS_RYUK_DISABLED=false" >> $GITHUB_ENV

      - name: Run Integration Tests with Testcontainers
        working-directory: ./apps/api
        run: ./gradlew test --no-daemon
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Publish Integration Test Results
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: API Integration Tests
          path: apps/api/build/test-results/test/*.xml
          reporter: java-junit

  # Security Integration Tests
  security-integration:
    name: Security Integration Tests
    runs-on: ubuntu-latest
    needs: [changes]
    if: always() && (needs.changes.outputs.any-service == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')

    # Add OIDC permissions
    permissions:
      contents: read
      id-token: write  # Required for OIDC token requests

    steps:
      - uses: actions/checkout@v7

      - name: GCP Authentication
        uses: ./.github/actions/gcp-auth
        with:
          configure-docker: 'false'

      - name: Get Service URLs
        id: urls
        run: |
          BACKEND_URL=$(gcloud run services describe nosilha-backend-api --region=${{ env.REGION }} --format='value(status.url)' 2>/dev/null || echo "")
          FRONTEND_URL=$(gcloud run services describe nosilha-frontend --region=${{ env.REGION }} --format='value(status.url)' 2>/dev/null || echo "")
          echo "backend_url=$BACKEND_URL" >> $GITHUB_OUTPUT
          echo "frontend_url=$FRONTEND_URL" >> $GITHUB_OUTPUT
          
      # These checks previously piped to `|| echo "Warning: ..."`, so a stripped
      # CSP header produced a green run. Track failures and exit non-zero.
      - name: Security Headers Check
        run: |
          failed=0

          check_headers() {
            local name="$1" url="$2"
            shift 2
            echo "Checking security headers for $name ($url)..."
            local headers
            headers=$(curl -fsSI "$url") || {
              echo "::error::$name is unreachable at $url"
              failed=1
              return
            }
            for header in "$@"; do
              if echo "$headers" | grep -qi "^$header:"; then
                echo "  ✅ $header"
              else
                echo "::error::$name is missing the $header header"
                failed=1
              fi
            done
          }

          if [ -n "${{ steps.urls.outputs.frontend_url }}" ]; then
            check_headers "frontend" "${{ steps.urls.outputs.frontend_url }}" \
              X-Frame-Options X-Content-Type-Options Content-Security-Policy
          fi

          if [ -n "${{ steps.urls.outputs.backend_url }}" ]; then
            check_headers "backend" "${{ steps.urls.outputs.backend_url }}/actuator/health" \
              X-Frame-Options X-Content-Type-Options
          fi

          exit $failed

  # Deployment Health Verification
  deployment-health:
    name: Deployment Health Check
    runs-on: ubuntu-latest
    needs: [changes]
    if: always() && (needs.changes.outputs.any-service == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')

    # Add OIDC permissions
    permissions:
      contents: read
      id-token: write  # Required for OIDC token requests

    steps:
      - uses: actions/checkout@v7

      - name: GCP Authentication
        uses: ./.github/actions/gcp-auth
        with:
          configure-docker: 'false'

      # Previously `curl -f ... || echo "❌ failed"`, so an outage produced a green
      # run with the failure buried in the log. Track failures and exit non-zero.
      - name: Check Service Health
        run: |
          failed=0

          if gcloud run services describe nosilha-backend-api --region=${{ env.REGION }} >/dev/null 2>&1; then
            BACKEND_URL=$(gcloud run services describe nosilha-backend-api --region=${{ env.REGION }} --format='value(status.url)')
            echo "Checking backend health: $BACKEND_URL/actuator/health"
            if curl -fsS --retry 3 --retry-delay 5 "$BACKEND_URL/actuator/health"; then
              echo "✅ Backend is healthy"
            else
              echo "::error::Backend health check failed at $BACKEND_URL/actuator/health"
              failed=1
            fi
          fi

          if gcloud run services describe nosilha-frontend --region=${{ env.REGION }} >/dev/null 2>&1; then
            FRONTEND_URL=$(gcloud run services describe nosilha-frontend --region=${{ env.REGION }} --format='value(status.url)')
            echo "Checking frontend health: $FRONTEND_URL"
            if curl -fsS --retry 3 --retry-delay 5 -o /dev/null "$FRONTEND_URL"; then
              echo "✅ Frontend is accessible"
            else
              echo "::error::Frontend health check failed at $FRONTEND_URL"
              failed=1
            fi
          fi

          exit $failed

  # Integration Test Report
  integration-report:
    name: Integration Test Report
    runs-on: ubuntu-latest
    needs: [
      api-integration-tests,
      security-integration,
      deployment-health
    ]
    if: always()

    steps:
      - name: Generate Integration Report
        run: |
          echo "## 🔗 Integration Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Test Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| API Integration | ${{ needs.api-integration-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Integration | ${{ needs.security-integration.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deployment Health | ${{ needs.deployment-health.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "*Integration tests completed at $(date)*" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Note:** Frontend E2E tests run locally only (not in CI)" >> $GITHUB_STEP_SUMMARY