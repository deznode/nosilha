# Gradle configuration for CI/CD optimization
# This file configures Gradle for stable CI builds and optimal performance

# Disable Gradle daemon in CI environments to prevent crashes
# The daemon is designed for interactive development and can become unstable in CI
org.gradle.daemon=false

# Disable parallel execution to prevent resource conflicts and improve stability
org.gradle.parallel=false

# Configure JVM arguments for optimal memory usage and encoding
# - Xmx3g: Set maximum heap size to 3GB (suitable for CI with 16GB RAM)
# - XX:MaxMetaspaceSize=512m: Limit metaspace to prevent memory issues
# - Dfile.encoding=UTF-8: Ensure consistent encoding across environments
org.gradle.jvmargs=-Xmx3g -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8

# Enable build caching for improved performance
# This helps offset some performance cost of disabling daemon and parallel execution
org.gradle.caching=true

# Configure normal priority for daemon processes (when daemon is enabled locally)
org.gradle.priority=normal

# Disable daemon performance monitoring to reduce overhead
org.gradle.daemon.performance.enable-monitoring=false