# ===================================================================
# TEST CONFIGURATION
# For running tests in CI/CD pipeline
# ===================================================================

app:
  cors:
    allowed-origins: http://localhost:3000

spring:
  # Test Database Configuration (PostgreSQL with Testcontainers)
  datasource:
    url: jdbc:tc:postgresql:16.0:///
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
    username: test
    password: test

  # JPA/Hibernate Configuration for tests
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 10

  flyway:
    enabled: true

  # GCP Services Configuration for tests
  # Note: GCP auto-configuration is excluded in CoreApplicationTests
  # Tests that need GCP services should configure emulators or mocks individually
  cloud:
    gcp:
      # Disable auto-configuration (requires explicit opt-in per test)
      # See CoreApplicationTests for exclusion example
      project-id: test-project
      # Emulator configuration (only used if GCP services are explicitly enabled)
      firestore:
        enabled: false
        emulator-host: localhost:8081
      storage:
        enabled: false
        emulator-host: http://localhost:8082

# Test GCS Configuration
# Disable GCP services in tests to avoid requiring credentials
gcp:
  enabled: false
  serverUrl: http://localhost:8082
  gcs-bucket-name: test-bucket

# Test JWT Configuration
supabase:
  jwt-secret: test-secret-key-that-is-at-least-32-characters-long

# Logging for tests
logging:
  level:
    com.nosilha: DEBUG
    org.springframework.test: DEBUG
    org.springframework.web: DEBUG
    root: WARN

# Management endpoints for tests
management:
  endpoints:
    web:
      exposure:
        include: health,info