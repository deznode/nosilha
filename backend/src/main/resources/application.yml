# ===================================================================
# PRODUCTION CONFIGURATION (Default Profile)
# For Google Cloud Run
# ===================================================================

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://nosilha.com,https://www.nosilha.com}

spring:
  application:
    name: nosilha-core-api

  # Multipart file upload configuration
  servlet:
    multipart:
      max-file-size: 10MB        # Allow up to 10MB per file
      max-request-size: 15MB     # Allow up to 15MB per request

  # Database Configuration for Production (Supabase Session Mode Pooler)
  # NOTE: The url, username, and password properties are intentionally omitted.
  # Spring Boot will automatically bind them from the Cloud Run environment variables:
  # SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
  # Using Session Mode (port 5432) for prepared statement support (required by Flyway)
  datasource:
    hikari:
      maximum-pool-size: 10             # Session Mode optimized (3 instances × 10 = 30 connections max)
      minimum-idle: 0                   # CRITICAL: Allows pool to scale to zero during idle periods
      connection-timeout: 20000         # 20 seconds connection timeout
      idle-timeout: 300000              # 5 minutes idle timeout (longer for Session Mode persistence)
      max-lifetime: 1800000             # 30 minutes max connection lifetime (Session Mode supports longer)
      leak-detection-threshold: 30000   # 30 seconds leak detection (earlier detection)
      validation-timeout: 3000          # 3 seconds validation timeout
      connection-test-query: "SELECT 1" # Simple validation query for connection health checks

  # Flyway Configuration
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

  # JPA/Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  # Disable default security password generation since we use JWT
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

  # Google Cloud Platform Configuration for Production
  # NOTE: The project-id is intentionally omitted as it will be bound from
  # the SPRING_CLOUD_GCP_PROJECT_ID environment variable.
  # Emulator settings are also omitted to connect to live GCP services.
  cloud:
    gcp: {}


# The production GCS bucket name, provided as an environment variable in Cloud Run.
gcp:
  gcs-bucket-name: ${GCS_BUCKET_NAME}

# The production Supabase JWT secret, sourced from Google Secret Manager
# and provided as an environment variable.
supabase:
  jwt-secret: ${SUPABASE_JWT_SECRET}

# Spring Boot Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never               # Public endpoint shows basic status only for monitoring
      show-components: never
  info:
    defaults:
      enabled: false
    build:
      enabled: true

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
logging:
  level:
    web: debug
    com.nosilha: debug