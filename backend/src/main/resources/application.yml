# ===================================================================
# PRODUCTION CONFIGURATION (Default Profile)
# For Google Cloud Run
# ===================================================================

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,https://*.run.app}

spring:
  application:
    name: nosilha-core-api

  # Multipart file upload configuration
  servlet:
    multipart:
      max-file-size: 10MB        # Allow up to 10MB per file
      max-request-size: 15MB     # Allow up to 15MB per request

  # Database Configuration for Production (Supabase)
  # NOTE: The url, username, and password properties are intentionally omitted.
  # Spring Boot will automatically bind them from the Cloud Run environment variables:
  # SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
  datasource:
    hikari:
      maximum-pool-size: 3              # Reduced for Supabase free tier (60 direct connections)
      minimum-idle: 1                   # Conservative minimum for session mode
      connection-timeout: 30000         # 30 seconds connection timeout
      idle-timeout: 600000              # 10 minutes idle timeout
      max-lifetime: 1800000             # 30 minutes max connection lifetime
      leak-detection-threshold: 60000   # 1 minute leak detection

  # Flyway Configuration
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

  # JPA/Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  # Disable default security password generation since we use JWT
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

  # Google Cloud Platform Configuration for Production
  # NOTE: The project-id is intentionally omitted as it will be bound from
  # the SPRING_CLOUD_GCP_PROJECT_ID environment variable.
  # Emulator settings are also omitted to connect to live GCP services.
  cloud:
    gcp: {}


# The production GCS bucket name, provided as an environment variable in Cloud Run.
gcp:
  gcs-bucket-name: ${GCS_BUCKET_NAME}

# The production Supabase JWT secret, sourced from Google Secret Manager
# and provided as an environment variable.
supabase:
  jwt-secret: ${SUPABASE_JWT_SECRET}

# Spring Boot Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never               # Public endpoint shows basic status only for monitoring
      show-components: never
  info:
    build:
      enabled: true
    java:
      enabled: false
    # Disable potentially sensitive contributors
    env:
      enabled: false
    git:
      enabled: false
    os:
      enabled: false

# Safe application information for actuator info endpoint
info:
  app:
    name: "Nos Ilha Core API"
    description: "Cultural Heritage Platform for Brava Island, Cape Verde"
    version: "@project.version@"
    region: "Brava Island, Cape Verde"
    purpose: "Community-driven tourism and cultural heritage directory"

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
logging:
  level:
    root: debug
    web: debug
    com.nosilha: debug