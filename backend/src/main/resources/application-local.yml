# Local development profile configuration
# This profile is designed to work with the local PostgreSQL Docker container

spring:
  # Database Configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/nosilha_db
    username: nosilha
    password: nosilha-pass
    # Connection Pool Configuration (HikariCP)
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  # Flyway Configuration
  flyway:
    enabled: true

  # JPA/Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
