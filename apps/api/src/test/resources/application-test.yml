# ===================================================================
# TEST CONFIGURATION
# For running tests in CI/CD pipeline
# ===================================================================

app:
  cors:
    allowed-origins: http://localhost:3000

spring:
  # Test Database Configuration (PostgreSQL with Testcontainers)
  datasource:
    url: jdbc:tc:postgresql:16.0:///?TC_DAEMON=true
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
    username: test
    password: test

  # JPA/Hibernate Configuration for tests
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 10

  flyway:
    enabled: true

  # OAuth2 Resource Server Configuration for tests
  # Note: Tests use a mock JwtDecoder from TestSecurityConfig, not the actual JWKS endpoint
  security:
    oauth2:
      resourceserver:
        jwt:
          # This URL is not used in tests (mock JwtDecoder is injected instead)
          jwk-set-uri: https://test-project.supabase.co/auth/v1/.well-known/jwks.json
          issuer-uri: https://test-project.supabase.co/auth/v1

# Test Supabase Configuration
supabase:
  project-url: https://test-project.supabase.co

# Logging for tests
logging:
  level:
    com.nosilha: DEBUG
    org.springframework.test: DEBUG
    org.springframework.web: DEBUG
    root: WARN

# Management endpoints for tests
management:
  endpoints:
    web:
      exposure:
        include: health,info